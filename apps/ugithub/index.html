<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#58a6ff">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/svg+xml" href="../icons/ugithub.svg">
  <link rel="apple-touch-icon" href="../icons/ugithub.png">
  <title>ugithub</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0e1a;
      --surface: #111827;
      --surface2: #1a2236;
      --border: #1e2940;
      --text: #d0d8e8;
      --text-dim: #6b7a94;
      --accent: #58a6ff;
      --accent-dim: rgba(88, 166, 255, 0.1);
      --green: #3fb950;
      --purple: #bc8cff;
      --red: #f85149;
      --yellow: #d29922;
      --radius: 8px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 16px 10px;
      border-bottom: 1px solid var(--border);
    }

    .header h1 {
      font-size: 1rem;
      font-weight: 700;
      color: var(--accent);
      flex: 1;
    }

    .btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--text);
      font-family: inherit;
      font-size: 0.8rem;
      padding: 5px 10px;
      border-radius: 6px;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
      white-space: nowrap;
    }
    .btn:hover { border-color: var(--accent); color: var(--accent); }
    .btn.primary { background: var(--accent); border-color: var(--accent); color: #0a0e1a; font-weight: 600; }
    .btn.primary:hover { background: #79baff; border-color: #79baff; }
    .btn.danger:hover { border-color: var(--red); color: var(--red); }
    .btn.active { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }

    /* ── Settings panel ── */
    #settings-panel {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      display: none;
    }
    #settings-panel.open { display: block; }

    .field-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--accent);
      margin-bottom: 5px;
    }

    .token-row {
      display: flex;
      gap: 8px;
      margin-bottom: 14px;
    }

    input[type="password"], input[type="text"] {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 0.8rem;
      padding: 7px 10px;
      outline: none;
      transition: border-color 0.15s;
    }
    input:focus { border-color: var(--accent); }

    .repo-add-row {
      display: flex;
      gap: 8px;
      margin-bottom: 8px;
    }

    .repo-list {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .repo-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 0.82rem;
    }

    .repo-item span { flex: 1; font-family: 'SF Mono', monospace; color: var(--text); }

    /* ── Toolbar ── */
    .toolbar {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
    }

    .filter-group { display: flex; gap: 4px; }

    .spacer { flex: 1; }

    .status-text {
      font-size: 0.75rem;
      color: var(--text-dim);
    }

    /* ── Issues feed ── */
    #feed {
      flex: 1;
      overflow-y: auto;
      padding: 12px 16px;
    }

    .issue-list { display: flex; flex-direction: column; gap: 4px; }

    .repo-chip {
      display: inline-block;
      padding: 1px 7px;
      border-radius: 10px;
      font-size: 0.68rem;
      font-weight: 600;
      white-space: nowrap;
      border: 1px solid;
    }

    .issue-type {
      font-size: 0.68rem;
      font-weight: 600;
      padding: 1px 6px;
      border-radius: 10px;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }
    .issue-type.open { color: var(--green); background: rgba(63,185,80,0.12); }
    .issue-type.closed { color: var(--purple); background: rgba(188,140,255,0.12); }

    .issue-item {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      padding: 8px 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.15s, background 0.15s;
    }
    .issue-item:hover { border-color: var(--accent); background: var(--surface2); }

    .issue-icon {
      margin-top: 2px;
      flex-shrink: 0;
      width: 16px;
      height: 16px;
    }

    .issue-body { flex: 1; min-width: 0; }

    .issue-title {
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--text);
      line-height: 1.4;
      word-break: break-word;
      margin-bottom: 4px;
    }

    .issue-meta {
      font-size: 0.72rem;
      color: var(--text-dim);
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .issue-number { color: var(--text-dim); }

    .label-chip {
      display: inline-block;
      padding: 1px 7px;
      border-radius: 10px;
      font-size: 0.68rem;
      font-weight: 500;
      border: 1px solid;
    }

    /* ── Empty / loading / error states ── */
    .empty-state {
      text-align: center;
      padding: 48px 24px;
      color: var(--text-dim);
      font-size: 0.85rem;
      line-height: 1.8;
    }

    .empty-state .big { font-size: 2rem; margin-bottom: 12px; }

    .loading {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 0;
      color: var(--text-dim);
      font-size: 0.82rem;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      width: 14px;
      height: 14px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      flex-shrink: 0;
    }

    .error-box {
      padding: 8px 12px;
      background: rgba(248, 81, 73, 0.08);
      border: 1px solid rgba(248, 81, 73, 0.25);
      border-radius: 6px;
      color: var(--red);
      font-size: 0.82rem;
      margin-bottom: 8px;
    }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="var(--accent)">
      <path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/>
    </svg>
    <h1>ugithub</h1>
    <button class="btn" id="refresh-btn" title="Refresh issues">&#8635; Refresh</button>
    <button class="btn" id="settings-btn">&#9881; Settings</button>
  </div>

  <!-- Settings panel -->
  <div id="settings-panel">
    <div class="field-label">GitHub Token</div>
    <div class="token-row">
      <input type="password" id="token-input" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx" autocomplete="off" spellcheck="false">
      <button class="btn primary" id="save-token-btn">Save</button>
    </div>
    <div style="font-size:0.72rem;color:var(--text-dim);margin-bottom:14px;">
      Token is stored in your browser's store. Needs <code style="color:var(--accent)">public_repo</code> scope (or <code style="color:var(--accent)">repo</code> for private repos).
    </div>

    <div class="field-label">Tracked Repositories</div>
    <div class="repo-add-row">
      <input type="text" id="repo-input" placeholder="owner/repo  (e.g. torvalds/linux)" spellcheck="false">
      <button class="btn primary" id="add-repo-btn">Add</button>
    </div>
    <div class="repo-list" id="repo-list"></div>
  </div>

  <!-- Toolbar -->
  <div class="toolbar">
    <div class="filter-group">
      <button class="btn active" data-state="open" id="filter-open">Open</button>
      <button class="btn" data-state="closed" id="filter-closed">Closed</button>
      <button class="btn" data-state="all" id="filter-all">All</button>
    </div>
    <span class="spacer"></span>
    <span class="status-text" id="status-text"></span>
  </div>

  <!-- Feed -->
  <div id="feed">
    <div class="empty-state" id="empty-state">
      <div class="big">&#128269;</div>
      Open <strong>Settings</strong> to add a GitHub token and repositories to track.
    </div>
  </div>

  <script src="../storage.js"></script>
  <script>
    (function() {

    // ── State ────────────────────────────────────────────────────────────────

    let token = localStorage.getItem('ugithub-token') || '';
    let repos = JSON.parse(localStorage.getItem('ugithub-repos') || '[]');
    let issueState = localStorage.getItem('ugithub-state') || 'open';
    let cache = {};   // { "owner/repo:state": { data, ts } }
    let loading = false;

    // ── DOM refs ─────────────────────────────────────────────────────────────

    const settingsBtn = document.getElementById('settings-btn');
    const settingsPanel = document.getElementById('settings-panel');
    const tokenInput = document.getElementById('token-input');
    const saveTokenBtn = document.getElementById('save-token-btn');
    const repoInput = document.getElementById('repo-input');
    const addRepoBtn = document.getElementById('add-repo-btn');
    const repoListEl = document.getElementById('repo-list');
    const feed = document.getElementById('feed');
    const emptyState = document.getElementById('empty-state');
    const statusText = document.getElementById('status-text');
    const refreshBtn = document.getElementById('refresh-btn');

    // ── Settings ─────────────────────────────────────────────────────────────

    settingsBtn.addEventListener('click', () => {
      settingsPanel.classList.toggle('open');
      if (settingsPanel.classList.contains('open')) {
        tokenInput.value = token ? '●'.repeat(20) : '';
        renderRepoList();
      }
    });

    tokenInput.addEventListener('focus', () => {
      if (tokenInput.value === '●'.repeat(20)) tokenInput.value = '';
      tokenInput.type = 'text';
    });
    tokenInput.addEventListener('blur', () => {
      if (!tokenInput.value) tokenInput.value = token ? '●'.repeat(20) : '';
      tokenInput.type = 'password';
    });

    saveTokenBtn.addEventListener('click', () => {
      const val = tokenInput.value.trim();
      if (val && val !== '●'.repeat(20)) {
        token = val;
        localStorage.setItem('ugithub-token', token);
        tokenInput.value = '●'.repeat(20);
        tokenInput.type = 'password';
        cache = {};
        setStatus('Token saved.');
        refresh();
      }
    });

    repoInput.addEventListener('keydown', e => { if (e.key === 'Enter') addRepo(); });
    addRepoBtn.addEventListener('click', addRepo);

    function addRepo() {
      const val = repoInput.value.trim().replace(/^https?:\/\/github\.com\//, '').replace(/\/$/, '');
      if (!val || !val.includes('/')) return;
      if (repos.includes(val)) { repoInput.value = ''; return; }
      repos.push(val);
      saveRepos();
      repoInput.value = '';
      renderRepoList();
      cache = {};
      refresh();
    }

    function removeRepo(repo) {
      repos = repos.filter(r => r !== repo);
      saveRepos();
      renderRepoList();
      cache = {};
      refresh();
    }

    function saveRepos() {
      localStorage.setItem('ugithub-repos', JSON.stringify(repos));
    }

    function renderRepoList() {
      repoListEl.innerHTML = '';
      if (repos.length === 0) {
        repoListEl.innerHTML = '<div style="font-size:0.78rem;color:var(--text-dim);padding:4px 2px;">No repositories tracked yet.</div>';
        return;
      }
      repos.forEach(repo => {
        const div = document.createElement('div');
        div.className = 'repo-item';
        div.innerHTML = `<span>${repo}</span><button class="btn danger" data-repo="${repo}" style="padding:3px 8px;font-size:0.75rem;">Remove</button>`;
        div.querySelector('button').addEventListener('click', () => removeRepo(repo));
        repoListEl.appendChild(div);
      });
    }

    // ── Filter buttons ────────────────────────────────────────────────────────

    document.querySelectorAll('[data-state]').forEach(btn => {
      btn.addEventListener('click', () => {
        issueState = btn.dataset.state;
        localStorage.setItem('ugithub-state', issueState);
        document.querySelectorAll('[data-state]').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        refresh();
      });
    });

    // Restore active filter
    document.querySelector(`[data-state="${issueState}"]`)?.classList.add('active');
    document.querySelectorAll('[data-state]').forEach(b => {
      if (b.dataset.state !== issueState) b.classList.remove('active');
    });

    // ── Refresh ───────────────────────────────────────────────────────────────

    refreshBtn.addEventListener('click', () => { cache = {}; refresh(); });

    async function refresh() {
      if (loading) return;
      if (repos.length === 0 || !token) {
        renderEmpty();
        return;
      }

      loading = true;
      refreshBtn.disabled = true;
      setStatus('Loading…');

      feed.innerHTML = '';

      const results = await Promise.all(repos.map(repo => fetchIssues(repo)));

      feed.innerHTML = '';

      // Show errors at top
      const errors = results.filter(r => r.error);
      errors.forEach(({ repo, error }) => {
        const errDiv = document.createElement('div');
        errDiv.className = 'error-box';
        errDiv.textContent = `${repo}: ${error}`;
        feed.appendChild(errDiv);
      });

      // Merge all issues into one list, tag each with its repo
      const allIssues = [];
      results.forEach(({ repo, issues }) => {
        if (issues) issues.forEach(issue => allIssues.push({ repo, issue }));
      });

      // Sort by created_at descending
      allIssues.sort((a, b) => new Date(b.issue.created_at) - new Date(a.issue.created_at));

      if (allIssues.length > 0) {
        const listEl = document.createElement('div');
        listEl.className = 'issue-list';
        listEl.innerHTML = allIssues.map(({ repo, issue }) => renderIssue(issue, repo)).join('');
        feed.appendChild(listEl);
      } else if (errors.length === 0) {
        renderEmpty();
      }

      loading = false;
      refreshBtn.disabled = false;
      setStatus(`Updated ${new Date().toLocaleTimeString()}`);
    }

    async function fetchIssues(repo) {
      const cacheKey = `${repo}:${issueState}`;
      const cached = cache[cacheKey];
      if (cached && Date.now() - cached.ts < 60_000) {
        return { repo, issues: cached.data };
      }

      try {
        const params = new URLSearchParams({
          state: issueState,
          per_page: '30',
          sort: 'created',
          direction: 'desc'
        });
        const res = await fetch(`https://api.github.com/repos/${repo}/issues?${params}`, {
          headers: {
            'Authorization': `Bearer ${token}`,
            'Accept': 'application/vnd.github+json',
            'X-GitHub-Api-Version': '2022-11-28'
          }
        });

        if (!res.ok) {
          const body = await res.json().catch(() => ({}));
          return { repo, issues: [], error: `${res.status}: ${body.message || res.statusText}` };
        }

        const data = await res.json();
        // GitHub issues API also returns pull requests; filter them out
        const issues = data.filter(i => !i.pull_request);
        cache[cacheKey] = { data: issues, ts: Date.now() };
        return { repo, issues };
      } catch (err) {
        return { repo, issues: [], error: err.message };
      }
    }

    // ── Rendering ─────────────────────────────────────────────────────────────

    // Distinct colors for each tracked repository
    const REPO_COLORS = [
      { r: 88, g: 166, b: 255 },   // blue
      { r: 63, g: 185, b: 80 },    // green
      { r: 210, g: 153, b: 34 },   // yellow
      { r: 188, g: 140, b: 255 },  // purple
      { r: 248, g: 81, b: 73 },    // red
      { r: 121, g: 192, b: 255 },  // light blue
      { r: 255, g: 166, b: 87 },   // orange
      { r: 219, g: 97, b: 162 },   // pink
    ];

    function getRepoColor(repo) {
      const idx = repos.indexOf(repo);
      return REPO_COLORS[idx % REPO_COLORS.length];
    }

    function renderIssue(issue, repo) {
      const isOpen = issue.state === 'open';
      const iconColor = isOpen ? 'var(--green)' : 'var(--purple)';
      const iconPath = isOpen
        ? `<circle cx="8" cy="8" r="6.5" stroke="${iconColor}" stroke-width="1.5" fill="none"/><circle cx="8" cy="8" r="2.5" fill="${iconColor}"/>`
        : `<circle cx="8" cy="8" r="6.5" stroke="${iconColor}" stroke-width="1.5" fill="none"/><path d="M5.5 8.5l2 2 3.5-4" stroke="${iconColor}" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>`;

      const labels = (issue.labels || []).map(lbl => {
        const hex = lbl.color || '888888';
        const r = parseInt(hex.slice(0,2),16);
        const g = parseInt(hex.slice(2,4),16);
        const b = parseInt(hex.slice(4,6),16);
        const luminance = (0.299*r + 0.587*g + 0.114*b) / 255;
        const textColor = luminance > 0.5 ? '#000' : '#fff';
        return `<span class="label-chip" style="background:rgba(${r},${g},${b},0.2);border-color:rgba(${r},${g},${b},0.5);color:${textColor === '#000' ? `rgb(${r},${g},${b})` : '#fff'}">${escHtml(lbl.name)}</span>`;
      }).join('');

      const ago = timeAgo(issue.created_at);
      const author = issue.user?.login || '';
      const rc = getRepoColor(repo);
      const repoShort = repo.split('/')[1] || repo;
      const stateClass = isOpen ? 'open' : 'closed';
      const stateLabel = isOpen ? 'open' : 'closed';

      return `<a class="issue-item" href="${issue.html_url}" target="_blank" rel="noopener">
        <svg class="issue-icon" viewBox="0 0 16 16" fill="none">${iconPath}</svg>
        <div class="issue-body">
          <div class="issue-title">${escHtml(issue.title)}</div>
          <div class="issue-meta">
            <span class="repo-chip" style="background:rgba(${rc.r},${rc.g},${rc.b},0.15);border-color:rgba(${rc.r},${rc.g},${rc.b},0.4);color:rgb(${rc.r},${rc.g},${rc.b})">${escHtml(repoShort)}</span>
            <span class="issue-type ${stateClass}">${stateLabel}</span>
            <span class="issue-number">#${issue.number}</span>
            ${author ? `<span>by ${escHtml(author)}</span>` : ''}
            <span>${ago}</span>
            ${labels}
            ${issue.comments > 0 ? `<span>&#128172; ${issue.comments}</span>` : ''}
          </div>
        </div>
      </a>`;
    }

    function renderEmpty() {
      feed.innerHTML = '';
      if (!token) {
        emptyState.innerHTML = '<div class="big">&#128272;</div>Open <strong>Settings</strong> to add your GitHub token and repositories to track.';
      } else if (repos.length === 0) {
        emptyState.innerHTML = '<div class="big">&#128269;</div>Open <strong>Settings</strong> and add repositories to monitor.';
      } else {
        emptyState.innerHTML = '<div class="big">&#10003;</div>No issues found.';
      }
      feed.appendChild(emptyState);
    }

    // ── Helpers ───────────────────────────────────────────────────────────────

    function escHtml(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function timeAgo(dateStr) {
      const sec = Math.floor((Date.now() - new Date(dateStr)) / 1000);
      if (sec < 60) return 'just now';
      if (sec < 3600) return `${Math.floor(sec/60)}m ago`;
      if (sec < 86400) return `${Math.floor(sec/3600)}h ago`;
      if (sec < 2592000) return `${Math.floor(sec/86400)}d ago`;
      if (sec < 31536000) return `${Math.floor(sec/2592000)}mo ago`;
      return `${Math.floor(sec/31536000)}y ago`;
    }

    function setStatus(msg) { statusText.textContent = msg; }

    // ── Init ──────────────────────────────────────────────────────────────────

    // Set active filter button
    document.querySelectorAll('[data-state]').forEach(b => {
      b.classList.toggle('active', b.dataset.state === issueState);
    });

    if (token && repos.length > 0) {
      refresh();
    } else {
      renderEmpty();
    }
    })();
  </script>
</body>
<script>if('serviceWorker' in navigator)navigator.serviceWorker.register('../sw.js');</script>
</html>
