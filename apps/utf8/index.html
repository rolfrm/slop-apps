<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#1a1a2e">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="icon" type="image/svg+xml" href="../icons/utf8.svg">
<link rel="apple-touch-icon" href="../icons/utf8.png">
<title>utf8</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0e1a;--surface:#111827;--surface2:#1a2236;--border:#1e2940;--text:#d0d8e8;--text-dim:#6b7a94;--accent:#e879f9;--accent-dim:rgba(232,121,249,0.1);--radius:8px}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden}
header{padding:12px 16px;display:flex;gap:10px;align-items:center;border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap}
header h1{font-size:16px;font-weight:600;color:var(--accent);margin-right:8px}
.tabs{display:flex;gap:4px}
.tab{padding:6px 14px;border-radius:var(--radius);border:1px solid var(--border);background:var(--surface);color:var(--text-dim);cursor:pointer;font-size:13px;transition:all .15s}
.tab:hover{border-color:var(--accent);color:var(--text)}
.tab.active{background:var(--accent-dim);border-color:var(--accent);color:var(--accent)}
.search-wrap{margin-left:auto;display:flex;gap:6px;align-items:center}
#search{padding:6px 12px;border-radius:var(--radius);border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:13px;width:180px;outline:none}
#search:focus{border-color:var(--accent)}
#search::placeholder{color:var(--text-dim)}

.sidebar-layout{display:flex;flex:1;overflow:hidden}
#sidebar{width:240px;border-right:1px solid var(--border);overflow-y:auto;flex-shrink:0;background:var(--surface)}
#sidebar .group{padding:6px 12px;cursor:pointer;font-size:13px;color:var(--text-dim);border-bottom:1px solid var(--border);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:all .1s}
#sidebar .group:hover{background:var(--surface2);color:var(--text)}
#sidebar .group.active{background:var(--accent-dim);color:var(--accent);border-left:3px solid var(--accent)}

.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
#grid-wrap{flex:1;overflow-y:auto;padding:12px}
#grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(48px,1fr));gap:4px}
.cell{aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:22px;border-radius:6px;background:var(--surface);border:1px solid var(--border);cursor:pointer;transition:all .12s;position:relative;overflow:hidden}
.cell:hover{border-color:var(--accent);background:var(--accent-dim);transform:scale(1.1);z-index:2}
.cell .cp{position:absolute;bottom:1px;font-size:8px;color:var(--text-dim);pointer-events:none;line-height:1}
.cell:hover .cp{color:var(--accent)}

#detail{border-top:1px solid var(--border);padding:10px 16px;display:flex;gap:20px;align-items:center;flex-shrink:0;min-height:56px;background:var(--surface)}
#detail .big{font-size:36px;width:48px;text-align:center}
#detail .info{font-size:13px;color:var(--text-dim);line-height:1.6}
#detail .info span{color:var(--text);font-family:monospace}
#toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--accent);color:#000;padding:8px 18px;border-radius:20px;font-size:13px;font-weight:600;opacity:0;transition:opacity .2s;pointer-events:none;z-index:999}
#toast.show{opacity:1}

@media(max-width:700px){
  #sidebar{width:180px}
  header{padding:8px 10px}
  #search{width:120px}
}
@media(max-width:500px){
  #sidebar{display:none}
  .sidebar-layout{flex-direction:column}
}
</style>
</head>
<body>
<header>
  <h1>utf8</h1>
  <div class="tabs">
    <button class="tab active" data-mode="thousands">By Number</button>
    <button class="tab" data-mode="blocks">By Block</button>
    <button class="tab" data-mode="emoji">Emoji</button>
  </div>
  <div class="search-wrap">

</header>
<div class="sidebar-layout">

  <div class="main">

async function loadEmojiNames() {
  if (emojiNames) return emojiNames;
  if (emojiNamesLoading) {
    while (emojiNamesLoading) await new Promise(r => setTimeout(r, 50));
    return emojiNames;
  }
  emojiNamesLoading = true;
  try {
    const resp = await fetch('emoji-names.json');
    const data = await resp.json();
    emojiNames = new Map();
    for (const [hex, name] of Object.entries(data)) {
      emojiNames.set(parseInt(hex, 16), name);
    }
  } catch(e) {
    console.warn('Could not load emoji names:', e);
    emojiNames = new Map();
  }
  emojiNamesLoading = false;
  return emojiNames;
}

function isRenderable(cp) {
  if (cp < 0x20 && cp !== 0x09 && cp !== 0x0A && cp !== 0x0D) return false;
  if (cp >= 0x7F && cp <= 0x9F) return false;
  if (cp >= 0xD800 && cp <= 0xDFFF) return false;
  if (cp === 0xFEFF || cp === 0xFFFE || cp === 0xFFFF) return false;
  if (cp >= 0xFDD0 && cp <= 0xFDEF) return false;
  if ((cp & 0xFFFF) === 0xFFFE || (cp & 0xFFFF) === 0xFFFF) return false;
  return true;
}

function cpToStr(cp) {
  return String.fromCodePoint(cp);
}

function hexCP(cp) {
  return 'U+' + cp.toString(16).toUpperCase().padStart(4, '0');
}

function getBlockName(cp) {
  for (const [s, e, name] of BLOCKS) {
    if (cp >= s && cp <= e) return name;
  }
  return 'Unknown';
}

function renderGrid(start, end) {
  grid.innerHTML = '';
  const frag = document.createDocumentFragment();
  const limit = Math.min(end - start + 1, 4096);
  for (let i = 0; i < limit; i++) {
    const cp = start + i;
    if (cp > 0x10FFFF) break;
    const cell = document.createElement('div');
    cell.className = 'cell';
    cell.dataset.cp = cp;
    if (isRenderable(cp)) {
      cell.textContent = cpToStr(cp);
    } else {
      cell.textContent = '\u00B7';
      cell.style.color = 'var(--text-dim)';
      cell.style.fontSize = '14px';
    }
    const label = document.createElement('span');
    label.className = 'cp';
    label.textContent = cp.toString(16).toUpperCase();
    cell.appendChild(label);
    frag.appendChild(cell);
  }
  grid.appendChild(frag);
  document.getElementById('grid-wrap').scrollTop = 0;
}

function renderEmojiGrid() {
  grid.innerHTML = '';
  const frag = document.createDocumentFragment();
  for (const [s, e] of EMOJI_RANGES) {
    for (let cp = s; cp <= e; cp++) {
      const cell = document.createElement('div');
      cell.className = 'cell';
      cell.dataset.cp = cp;
      cell.textContent = cpToStr(cp);
      const label = document.createElement('span');
      label.className = 'cp';
      label.textContent = cp.toString(16).toUpperCase();
      cell.appendChild(label);
      frag.appendChild(cell);
    }
  }
  grid.appendChild(frag);
  document.getElementById('grid-wrap').scrollTop = 0;
}

function buildThousandsSidebar() {
  sidebar.innerHTML = '';
  const groups = [];
  // BMP: 0-65k by thousands, then key supplementary ranges
  for (let i = 0; i < 65; i++) {
    const s = i * 1000;
    const e = s + 999;
    groups.push([s, e, `${hexCP(s)} \u2013 ${hexCP(e)}`]);
  }
  groups.push([0x10000, 0x10FFF, 'U+10000 \u2013 U+10FFF']);
  groups.push([0x11000, 0x11FFF, 'U+11000 \u2013 U+11FFF']);
  groups.push([0x12000, 0x12FFF, 'U+12000 \u2013 U+12FFF']);
  groups.push([0x13000, 0x13FFF, 'U+13000 \u2013 U+13FFF']);
  groups.push([0x16000, 0x16FFF, 'U+16000 \u2013 U+16FFF']);
  groups.push([0x1D000, 0x1D7FF, 'U+1D000 \u2013 U+1D7FF Math/Music']);
  groups.push([0x1F000, 0x1F0FF, 'U+1F000 \u2013 U+1F0FF Tiles/Cards']);
  groups.push([0x1F100, 0x1F2FF, 'U+1F100 \u2013 U+1F2FF Enclosed']);
  groups.push([0x1F300, 0x1F5FF, 'U+1F300 \u2013 U+1F5FF Symbols']);
  groups.push([0x1F600, 0x1F64F, 'U+1F600 \u2013 U+1F64F Emoticons']);
  groups.push([0x1F680, 0x1F6FF, 'U+1F680 \u2013 U+1F6FF Transport']);
  groups.push([0x1F700, 0x1F7FF, 'U+1F700 \u2013 U+1F7FF Alchemical']);
  groups.push([0x1F900, 0x1F9FF, 'U+1F900 \u2013 U+1F9FF Supplemental']);
  groups.push([0x1FA00, 0x1FAFF, 'U+1FA00 \u2013 U+1FAFF Extended-A']);

  const frag = document.createDocumentFragment();
  groups.forEach(([s, e, label], idx) => {
    const div = document.createElement('div');
    div.className = 'group' + (idx === 0 ? ' active' : '');
    div.textContent = label;
    div.onclick = () => {
      sidebar.querySelectorAll('.group').forEach(g => g.classList.remove('active'));
      div.classList.add('active');
      currentRange = [s, e];
      renderGrid(s, e);
    };
    frag.appendChild(div);
  });
  sidebar.appendChild(frag);
}

function buildBlocksSidebar() {
  sidebar.innerHTML = '';
  const frag = document.createDocumentFragment();
  // Skip huge CJK/Hangul blocks that would be too large
  const maxSize = 4096;
  BLOCKS.forEach(([s, e, name], idx) => {
    const div = document.createElement('div');
    div.className = 'group' + (idx === 0 ? ' active' : '');
    const size = e - s + 1;
    const displayName = size > maxSize ? `${name} (first ${maxSize})` : name;
    div.textContent = displayName;
    div.title = `${hexCP(s)} \u2013 ${hexCP(e)} (${size} chars)`;
    div.onclick = () => {
      sidebar.querySelectorAll('.group').forEach(g => g.classList.remove('active'));
      div.classList.add('active');
      currentRange = [s, Math.min(e, s + maxSize - 1)];
      renderGrid(s, Math.min(e, s + maxSize - 1));
    };
    frag.appendChild(div);
  });
  sidebar.appendChild(frag);
}

function buildEmojiSidebar() {
  sidebar.innerHTML = '';
  const cats = [
    ['All Emoji', null],
    ['Smileys', [0x1F600, 0x1F64F]],
    ['People & Body', [0x1F900, 0x1F9FF]],
    ['Animals & Nature', [0x1F400, 0x1F4FF]],
    ['Food & Drink', [0x1F345, 0x1F37F]],
    ['Travel & Places', [0x1F680, 0x1F6FF]],
    ['Objects', [0x1F4A0, 0x1F4FF]],
    ['Symbols', [0x2600, 0x26FF]],
    ['Misc Symbols', [0x1F300, 0x1F3FF]],
    ['Flags', [0x1F1E0, 0x1F1FF]],
    ['Extended-A', [0x1FA70, 0x1FAFF]],
  ];
  const frag = document.createDocumentFragment();
  cats.forEach(([name, range], idx) => {
    const div = document.createElement('div');
    div.className = 'group' + (idx === 0 ? ' active' : '');
    div.textContent = name;
    div.onclick = () => {
      sidebar.querySelectorAll('.group').forEach(g => g.classList.remove('active'));
      div.classList.add('active');
      if (!range) {
        renderEmojiGrid();
      } else {
        // Filter EMOJI_RANGES for this subset
        grid.innerHTML = '';
        const fragG = document.createDocumentFragment();
        for (const [s, e] of EMOJI_RANGES) {
          if (e < range[0] || s > range[1]) continue;
          const rs = Math.max(s, range[0]);
          const re = Math.min(e, range[1]);
          for (let cp = rs; cp <= re; cp++) {
            const cell = document.createElement('div');
            cell.className = 'cell';
            cell.dataset.cp = cp;
            cell.textContent = cpToStr(cp);
            const label = document.createElement('span');
            label.className = 'cp';
            label.textContent = cp.toString(16).toUpperCase();
            cell.appendChild(label);
            fragG.appendChild(cell);
          }
        }
        grid.appendChild(fragG);
        document.getElementById('grid-wrap').scrollTop = 0;
      }
    };
    frag.appendChild(div);
  });
  sidebar.appendChild(frag);
}

function setMode(m) {
  mode = m;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.mode === m));
  if (m === 'thousands') {
    buildThousandsSidebar();
    currentRange = [0, 999];
    renderGrid(0, 999);
  } else if (m === 'blocks') {
    buildBlocksSidebar();
    currentRange = [BLOCKS[0][0], BLOCKS[0][1]];
    renderGrid(BLOCKS[0][0], BLOCKS[0][1]);
  } else if (m === 'emoji') {
    buildEmojiSidebar();
    renderEmojiGrid();
  }
}

// Click to copy
grid.addEventListener('click', (e) => {
  const cell = e.target.closest('.cell');
  if (!cell) return;
  const cp = parseInt(cell.dataset.cp);
  if (!isRenderable(cp)) return;
  const ch = cpToStr(cp);
  navigator.clipboard.writeText(ch).then(() => {
    showToast(`Copied ${ch}  (${hexCP(cp)})`);
  }).catch(() => {
    // Fallback
    const ta = document.createElement('textarea');
    ta.value = ch;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showToast(`Copied ${ch}  (${hexCP(cp)})`);
  });
  detChar.textContent = ch;
  const ename = getEmojiName(cp);
  detInfo.innerHTML = `<span>${hexCP(cp)}</span> &middot; Dec: <span>${cp}</span> &middot; Block: <span>${getBlockName(cp)}</span> &middot; UTF-8: <span>${utf8Bytes(cp)}</span>${ename ? ' &middot; <span>' + ename + '</span>' : ''}`;
});

// Hover detail
grid.addEventListener('mouseover', (e) => {
  const cell = e.target.closest('.cell');
  if (!cell) return;
  const cp = parseInt(cell.dataset.cp);
  const ch = isRenderable(cp) ? cpToStr(cp) : '\u00B7';
  detChar.textContent = ch;
  const ename = getEmojiName(cp);
  detInfo.innerHTML = `<span>${hexCP(cp)}</span> &middot; Dec: <span>${cp}</span> &middot; Block: <span>${getBlockName(cp)}</span> &middot; UTF-8: <span>${utf8Bytes(cp)}</span>${ename ? ' &middot; <span>' + ename + '</span>' : ''}`;
});

function utf8Bytes(cp) {
  const bytes = [];
  if (cp < 0x80) {
    bytes.push(cp);
  } else if (cp < 0x800) {
    bytes.push(0xC0 | (cp >> 6));
    bytes.push(0x80 | (cp & 0x3F));
  } else if (cp < 0x10000) {
    bytes.push(0xE0 | (cp >> 12));
    bytes.push(0x80 | ((cp >> 6) & 0x3F));
    bytes.push(0x80 | (cp & 0x3F));
  } else {
    bytes.push(0xF0 | (cp >> 18));
    bytes.push(0x80 | ((cp >> 12) & 0x3F));
    bytes.push(0x80 | ((cp >> 6) & 0x3F));
    bytes.push(0x80 | (cp & 0x3F));
  }
  return bytes.map(b => b.toString(16).toUpperCase().padStart(2, '0')).join(' ');
}

// Search
let searchDebounce;
searchInput.addEventListener('input', () => {
  clearTimeout(searchDebounce);
  searchDebounce = setTimeout(doSearch, 300);
});

function doSearch() {
  const q = searchInput.value.trim();
  if (!q) {
    setMode(mode);
    return;
  }
  // Try U+hex or 0x hex
  const hexMatch = q.match(/^(?:U\+|0x|\\u)?([0-9A-Fa-f]{1,6})$/);
  if (hexMatch) {
    const cp = parseInt(hexMatch[1], 16);
    if (cp <= 0x10FFFF) {
      // Show a range around this codepoint
      const start = Math.max(0, cp - 64);
      const end = Math.min(0x10FFFF, cp + 191);
      sidebar.innerHTML = '<div class="group active">Search: ' + hexCP(cp) + '</div>';
      renderGrid(start, end);
      return;
    }
  }
  // Try decimal
  const decMatch = q.match(/^(\d+)$/);
  if (decMatch) {
    const cp = parseInt(decMatch[1]);
    if (cp <= 0x10FFFF) {
      const start = Math.max(0, cp - 64);
      const end = Math.min(0x10FFFF, cp + 191);
      sidebar.innerHTML = '<div class="group active">Search: ' + hexCP(cp) + '</div>';
      renderGrid(start, end);
      return;
    }
  }
  // Search emoji names first
  const lower = q.toLowerCase();
  if (emojiNames && emojiNames.size > 0) {
    const words = lower.split(/\s+/);
    const emojiMatches = [];
    for (const [cp, name] of emojiNames) {
      if (words.every(w => name.includes(w))) {
        emojiMatches.push([cp, name]);
      }
    }
    if (emojiMatches.length > 0) {
      // Sort by name length (shorter = more relevant)
      emojiMatches.sort((a, b) => a[1].length - b[1].length);
      const limited = emojiMatches.slice(0, 500);
      sidebar.innerHTML = '<div class="group active">Emoji: "' + q + '" (' + emojiMatches.length + ' results)</div>';
      grid.innerHTML = '';
      const frag = document.createDocumentFragment();
      for (const [cp, name] of limited) {
        const cell = document.createElement('div');
        cell.className = 'cell';
        cell.dataset.cp = cp;
        cell.textContent = cpToStr(cp);
        cell.title = name;
        const label = document.createElement('span');
        label.className = 'cp';
        label.textContent = cp.toString(16).toUpperCase();
        cell.appendChild(label);
        frag.appendChild(cell);
      }
      grid.appendChild(frag);
      document.getElementById('grid-wrap').scrollTop = 0;
      return;
    }
  }

  // Search block names
  const matches = BLOCKS.filter(([,,name]) => name.toLowerCase().includes(lower));
  if (matches.length > 0) {
    sidebar.innerHTML = '';
    const frag = document.createDocumentFragment();
    matches.forEach(([s, e, name], idx) => {
      const div = document.createElement('div');
      div.className = 'group' + (idx === 0 ? ' active' : '');
      div.textContent = name;
      div.onclick = () => {
        sidebar.querySelectorAll('.group').forEach(g => g.classList.remove('active'));
        div.classList.add('active');
        renderGrid(s, Math.min(e, s + 4095));
      };
      frag.appendChild(div);
    });
    sidebar.appendChild(frag);
    const [s, e] = matches[0];
    renderGrid(s, Math.min(e, s + 4095));
  }
}

// Tab clicks
document.querySelectorAll('.tab').forEach(t => {
  t.addEventListener('click', () => setMode(t.dataset.mode));
});

// Init
setMode('thousands');
</script>
