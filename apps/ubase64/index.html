<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#22d3ee">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <link rel="icon" type="image/svg+xml" href="../icons/slopos.svg">
  <link rel="apple-touch-icon" href="../icons/slopos.png">
  <title>ubase64</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0e1a;
      --surface: #111827;
      --surface2: #1a2236;
      --border: #1e2940;
      --text: #d0d8e8;
      --text-dim: #6b7a94;
      --accent: #22d3ee;
      --accent-dim: rgba(34, 211, 238, 0.1);
      --radius: 8px;
      --green: #34d399;
      --red: #f87171;
    }

    body {
      font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 40px 20px;
    }

    .container { max-width: 800px; width: 100%; }

    h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 4px; }
    .subtitle { color: var(--text-dim); font-size: 0.85rem; margin-bottom: 24px; }

    label {
      display: block;
      font-size: 0.8rem;
      color: var(--text-dim);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .section { margin-bottom: 20px; }
    .sep { height: 1px; background: var(--border); margin: 20px 0; }

    textarea {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: inherit;
      font-size: 0.85rem;
      padding: 10px 12px;
      width: 100%;
      resize: vertical;
      min-height: 120px;
    }
    textarea:focus { outline: none; border-color: var(--accent); }

    .tabs {
      display: flex;
      gap: 0;
      margin-bottom: 16px;
    }

    .tab {
      flex: 1;
      padding: 10px;
      text-align: center;
      font-size: 0.85rem;
      font-family: inherit;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text-dim);
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .tab:first-child { border-radius: var(--radius) 0 0 var(--radius); }
    .tab:last-child { border-radius: 0 var(--radius) var(--radius) 0; }
    .tab.active {
      background: var(--accent-dim);
      color: var(--accent);
      border-color: var(--accent);
    }

    .btn {
      background: var(--accent-dim);
      border: 1px solid var(--accent);
      border-radius: var(--radius);
      color: var(--accent);
      font-family: inherit;
      font-size: 0.85rem;
      padding: 10px 18px;
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
    }
    .btn:hover { background: rgba(34, 211, 238, 0.2); }

    .btn-small {
      font-size: 0.75rem;
      padding: 6px 12px;
    }

    .btn-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    .output-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px;
      font-size: 0.8rem;
      word-break: break-all;
      white-space: pre-wrap;
      max-height: 300px;
      overflow-y: auto;
      user-select: all;
      min-height: 60px;
    }

    .info {
      font-size: 0.75rem;
      color: var(--text-dim);
      margin-top: 6px;
    }

    .error {
      color: var(--red);
      font-size: 0.85rem;
      margin-top: 8px;
    }

    .hidden { display: none !important; }

    .file-drop {
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      padding: 24px;
      text-align: center;
      color: var(--text-dim);
      font-size: 0.85rem;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
    }
    .file-drop:hover, .file-drop.dragover {
      border-color: var(--accent);
      background: var(--accent-dim);
    }
    .file-drop input { display: none; }

    .file-info {
      margin-top: 8px;
      font-size: 0.8rem;
      color: var(--accent);
    }

    .input-tabs {
      display: flex;
      gap: 0;
      margin-bottom: 12px;
    }
    .input-tab {
      padding: 8px 16px;
      font-size: 0.8rem;
      font-family: inherit;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text-dim);
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .input-tab:first-child { border-radius: var(--radius) 0 0 var(--radius); }
    .input-tab:last-child { border-radius: 0 var(--radius) var(--radius) 0; }
    .input-tab.active {
      background: var(--accent-dim);
      color: var(--accent);
      border-color: var(--accent);
    }

    .copied { color: var(--green) !important; }
  </style>
</head>
<body>
  <div class="container">
    <h1>ubase64</h1>
    <p class="subtitle">Base64 encode & decode. Text, files, and URLs. Everything stays in your browser.</p>

    <!-- Mode tabs -->
    <div class="tabs">
      <button class="tab active" data-mode="encode">Encode</button>
      <button class="tab" data-mode="decode">Decode</button>
    </div>

    <!-- Input source tabs -->
    <div class="section">
      <div class="input-tabs">
        <button class="input-tab active" data-input="text">Text</button>
        <button class="input-tab" data-input="file">File</button>
      </div>

      <div id="text-input">
        <textarea id="input-text" placeholder="Enter text to encode or base64 to decode..."></textarea>
      </div>

      <div id="file-input" class="hidden">
        <div class="file-drop" id="file-drop">
          Drop a file here or click to browse
          <input type="file" id="file-picker">
          <div class="file-info hidden" id="file-info"></div>
        </div>
      </div>
    </div>

    <!-- Options -->
    <div class="section">
      <div class="btn-row">
        <button class="btn" id="btn-convert">Encode</button>
        <label style="display:flex; align-items:center; gap:6px; text-transform:none; letter-spacing:normal; font-size:0.8rem; color:var(--text-dim); cursor:pointer;">
          <input type="checkbox" id="opt-urlsafe" style="accent-color:var(--accent);"> URL-safe
        </label>
        <label style="display:flex; align-items:center; gap:6px; text-transform:none; letter-spacing:normal; font-size:0.8rem; color:var(--text-dim); cursor:pointer;">
          <input type="checkbox" id="opt-wrap" style="accent-color:var(--accent);"> Line wrap (76 chars)
        </label>
      </div>
      <div class="error hidden" id="error-msg"></div>
    </div>

    <div class="sep"></div>

    <!-- Output -->
    <div class="section">
      <label>Output</label>
      <div class="output-box" id="output-box"></div>
      <div class="info" id="output-info"></div>
      <div class="btn-row" style="margin-top: 8px;">
        <button class="btn btn-small" id="btn-copy">Copy</button>
        <button class="btn btn-small" id="btn-download">Download</button>
        <button class="btn btn-small" id="btn-swap">↕ Swap to input</button>
      </div>
    </div>
  </div>

  <script>
    let mode = 'encode';
    let inputSource = 'text';
    let fileData = null;
    let fileName = '';

    const inputTextEl = document.getElementById('input-text');
    const outputBox = document.getElementById('output-box');
    const outputInfo = document.getElementById('output-info');
    const errorEl = document.getElementById('error-msg');
    const btnConvert = document.getElementById('btn-convert');
    const optUrlSafe = document.getElementById('opt-urlsafe');
    const optWrap = document.getElementById('opt-wrap');
    const fileDropEl = document.getElementById('file-drop');
    const filePickerEl = document.getElementById('file-picker');
    const fileInfoEl = document.getElementById('file-info');

    // Mode tabs
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        mode = tab.dataset.mode;
        btnConvert.textContent = mode === 'encode' ? 'Encode' : 'Decode';
        autoConvert();
      });
    });

    // Input source tabs
    document.querySelectorAll('.input-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.input-tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        inputSource = tab.dataset.input;
        document.getElementById('text-input').classList.toggle('hidden', inputSource !== 'text');
        document.getElementById('file-input').classList.toggle('hidden', inputSource !== 'file');
      });
    });

    // File handling
    fileDropEl.addEventListener('click', () => filePickerEl.click());
    fileDropEl.addEventListener('dragover', e => { e.preventDefault(); fileDropEl.classList.add('dragover'); });
    fileDropEl.addEventListener('dragleave', () => fileDropEl.classList.remove('dragover'));
    fileDropEl.addEventListener('drop', e => {
      e.preventDefault();
      fileDropEl.classList.remove('dragover');
      if (e.dataTransfer.files.length) loadFile(e.dataTransfer.files[0]);
    });
    filePickerEl.addEventListener('change', () => {
      if (filePickerEl.files.length) loadFile(filePickerEl.files[0]);
    });

    function loadFile(file) {
      fileName = file.name;
      const reader = new FileReader();
      reader.onload = () => {
        fileData = new Uint8Array(reader.result);
        fileInfoEl.textContent = `${file.name} (${formatSize(file.size)})`;
        fileInfoEl.classList.remove('hidden');
      };
      reader.readAsArrayBuffer(file);
    }

    function formatSize(bytes) {
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
      return (bytes / 1048576).toFixed(1) + ' MB';
    }

    // Auto-convert on text input
    let debounce = null;
    inputTextEl.addEventListener('input', () => {
      clearTimeout(debounce);
      debounce = setTimeout(autoConvert, 200);
    });
    optUrlSafe.addEventListener('change', autoConvert);
    optWrap.addEventListener('change', autoConvert);

    function autoConvert() {
      errorEl.classList.add('hidden');
      if (inputSource === 'text' && inputTextEl.value.length > 0) {
        convert();
      }
    }

    // Convert button
    btnConvert.addEventListener('click', () => {
      errorEl.classList.add('hidden');
      convert();
    });

    function convert() {
      try {
        if (mode === 'encode') {
          encode();
        } else {
          decode();
        }
      } catch (err) {
        showError(err.message);
      }
    }

    function encode() {
      let bytes;
      if (inputSource === 'file') {
        if (!fileData) throw new Error('No file selected');
        bytes = fileData;
      } else {
        const text = inputTextEl.value;
        if (!text) { outputBox.textContent = ''; outputInfo.textContent = ''; return; }
        bytes = new TextEncoder().encode(text);
      }

      let b64 = uint8ToBase64(bytes);

      if (optUrlSafe.checked) {
        b64 = b64.replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
      }

      if (optWrap.checked) {
        b64 = b64.match(/.{1,76}/g).join('\n');
      }

      outputBox.textContent = b64;
      outputInfo.textContent = `Input: ${formatSize(bytes.length)} → Output: ${formatSize(b64.length)} (${(b64.length / bytes.length * 100).toFixed(0)}% of original)`;
    }

    function decode() {
      let b64;
      if (inputSource === 'file') {
        if (!fileData) throw new Error('No file selected');
        b64 = new TextDecoder().decode(fileData);
      } else {
        b64 = inputTextEl.value;
      }

      if (!b64.trim()) { outputBox.textContent = ''; outputInfo.textContent = ''; return; }

      // Clean whitespace and handle URL-safe
      b64 = b64.replace(/\s/g, '');
      b64 = b64.replace(/-/g, '+').replace(/_/g, '/');
      // Add padding if missing
      while (b64.length % 4 !== 0) b64 += '=';

      let bytes;
      try {
        bytes = base64ToUint8(b64);
      } catch {
        throw new Error('Invalid base64 input');
      }

      // Try to display as UTF-8 text
      try {
        const text = new TextDecoder('utf-8', { fatal: true }).decode(bytes);
        outputBox.textContent = text;
      } catch {
        // Show hex dump for binary
        outputBox.textContent = hexDump(bytes);
      }

      outputInfo.textContent = `Input: ${formatSize(b64.length)} → Output: ${formatSize(bytes.length)}`;
    }

    function uint8ToBase64(bytes) {
      let binary = '';
      for (let i = 0; i < bytes.length; i++) {
        binary += String.fromCharCode(bytes[i]);
      }
      return btoa(binary);
    }

    function base64ToUint8(b64) {
      const binary = atob(b64);
      const bytes = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
      return bytes;
    }

    function hexDump(bytes) {
      const lines = [];
      for (let i = 0; i < bytes.length; i += 16) {
        const slice = bytes.slice(i, i + 16);
        const hex = [...slice].map(b => b.toString(16).padStart(2, '0')).join(' ');
        const ascii = [...slice].map(b => (b >= 32 && b < 127) ? String.fromCharCode(b) : '.').join('');
        lines.push(`${i.toString(16).padStart(8, '0')}  ${hex.padEnd(48)}  ${ascii}`);
      }
      return lines.join('\n');
    }

    function showError(msg) {
      errorEl.textContent = msg;
      errorEl.classList.remove('hidden');
    }

    // Copy
    document.getElementById('btn-copy').addEventListener('click', () => {
      const text = outputBox.textContent;
      if (!text) return;
      const btn = document.getElementById('btn-copy');
      navigator.clipboard.writeText(text).then(() => {
        const orig = btn.textContent;
        btn.textContent = 'Copied!';
        btn.classList.add('copied');
        setTimeout(() => { btn.textContent = orig; btn.classList.remove('copied'); }, 1500);
      });
    });

    // Download
    document.getElementById('btn-download').addEventListener('click', () => {
      const text = outputBox.textContent;
      if (!text) return;
      const blob = new Blob([text], { type: 'application/octet-stream' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = mode === 'encode' ? 'encoded.b64' : 'decoded.bin';
      a.click();
      URL.revokeObjectURL(url);
    });

    // Swap output to input
    document.getElementById('btn-swap').addEventListener('click', () => {
      const text = outputBox.textContent;
      if (!text) return;
      inputTextEl.value = text;
      // Switch to text input mode
      document.querySelectorAll('.input-tab').forEach(t => t.classList.remove('active'));
      document.querySelector('.input-tab[data-input="text"]').classList.add('active');
      inputSource = 'text';
      document.getElementById('text-input').classList.remove('hidden');
      document.getElementById('file-input').classList.add('hidden');
      // Toggle mode
      mode = mode === 'encode' ? 'decode' : 'encode';
      document.querySelectorAll('.tab').forEach(t => {
        t.classList.toggle('active', t.dataset.mode === mode);
      });
      btnConvert.textContent = mode === 'encode' ? 'Encode' : 'Decode';
      autoConvert();
    });
  </script>
  <script>if('serviceWorker' in navigator)navigator.serviceWorker.register('../sw.js');</script>
</body>
</html>
