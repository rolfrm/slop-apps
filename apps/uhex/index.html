<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#f97316">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <link rel="icon" type="image/svg+xml" href="../icons/slopos.svg">
  <link rel="apple-touch-icon" href="../icons/slopos.png">
  <title>uhex</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0e1a;
      --surface: #111827;
      --surface2: #1a2236;
      --border: #1e2940;
      --text: #d0d8e8;
      --text-dim: #6b7a94;
      --accent: #f97316;
      --accent-dim: rgba(249, 115, 22, 0.1);
      --radius: 8px;
      --green: #34d399;
      --red: #f87171;
      --blue: #60a5fa;
    }

    body {
      font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 40px 20px;
    }

    .container { max-width: 960px; width: 100%; }

    h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 4px; }
    .subtitle { color: var(--text-dim); font-size: 0.85rem; margin-bottom: 24px; }

    .btn {
      background: var(--accent-dim);
      border: 1px solid var(--accent);
      border-radius: var(--radius);
      color: var(--accent);
      font-family: inherit;
      font-size: 0.85rem;
      padding: 10px 18px;
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
    }
    .btn:hover { background: rgba(249, 115, 22, 0.2); }
    .btn-small { font-size: 0.75rem; padding: 6px 12px; }

    .btn-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
      margin-bottom: 16px;
    }

    .file-drop {
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      padding: 24px;
      text-align: center;
      color: var(--text-dim);
      font-size: 0.85rem;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      margin-bottom: 16px;
    }
    .file-drop:hover, .file-drop.dragover {
      border-color: var(--accent);
      background: var(--accent-dim);
    }
    .file-drop input { display: none; }
    .file-info {
      margin-top: 8px;
      font-size: 0.8rem;
      color: var(--accent);
    }

    .hidden { display: none !important; }
    .copied { color: var(--green) !important; }

    .hex-view {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: auto;
      max-height: calc(100vh - 280px);
      min-height: 200px;
    }

    .hex-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.8rem;
      line-height: 1.6;
    }

    .hex-table thead {
      position: sticky;
      top: 0;
      z-index: 1;
    }

    .hex-table th {
      background: var(--surface2);
      color: var(--text-dim);
      font-weight: 500;
      padding: 4px 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.7rem;
      text-align: center;
      user-select: none;
    }

    .hex-table th.offset-header {
      width: 72px;
      text-align: right;
      padding-right: 8px;
    }

    .hex-table th.ascii-header {
      text-align: left;
      padding-left: 8px;
    }

    .hex-table th.hex-header {
      width: 26px;
    }

    .hex-table th.hex-gap {
      width: 8px;
    }

    .hex-row { height: 24px; }

    .hex-row:hover .hex-offset,
    .hex-row:hover .hex-cell,
    .hex-row:hover .ascii-cell {
      background: var(--surface2);
    }

    .hex-offset {
      color: var(--text-dim);
      text-align: right;
      padding-right: 8px;
      user-select: none;
      white-space: nowrap;
    }

    .hex-cell {
      text-align: center;
      padding: 0 1px;
      cursor: text;
      position: relative;
    }

    .hex-cell.null { color: #4a5568; }
    .hex-cell.printable { color: var(--text); }
    .hex-cell.high { color: var(--blue); }
    .hex-cell.selected, .ascii-char.selected {
      background: rgba(249, 115, 22, 0.3);
      border-radius: 2px;
    }

    .ascii-cell {
      padding-left: 8px;
      border-left: 1px solid var(--border);
      white-space: pre;
      letter-spacing: 0.5px;
    }

    .ascii-char { cursor: text; }
    .ascii-char.null { color: #4a5568; }
    .ascii-char.printable { color: var(--text); }
    .ascii-char.high { color: var(--blue); }

    .hex-edit-input {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(249, 115, 22, 0.15);
      border: 1px solid var(--accent);
      border-radius: 2px;
      color: var(--accent);
      font-family: inherit;
      font-size: inherit;
      text-align: center;
      padding: 0;
      outline: none;
      width: 100%;
    }

    .status-bar {
      display: flex;
      justify-content: space-between;
      margin-top: 8px;
      font-size: 0.75rem;
      color: var(--text-dim);
    }

    .goto-input {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: inherit;
      font-size: 0.8rem;
      padding: 6px 10px;
      width: 120px;
    }
    .goto-input:focus { outline: none; border-color: var(--accent); }
    .goto-input::placeholder { color: var(--text-dim); }
  </style>
</head>
<body>
  <div class="container">
    <h1>uhex</h1>
    <p class="subtitle">Hex editor. View and edit binary files. Everything stays in your browser.</p>

    <div class="file-drop" id="file-drop">
      Drop a file here or click to browse
      <input type="file" id="file-picker">
      <div class="file-info hidden" id="file-info"></div>
    </div>

    <div class="btn-row">
      <button class="btn btn-small" id="btn-new">New (empty)</button>
      <button class="btn btn-small" id="btn-save">Save</button>
      <button class="btn btn-small" id="btn-undo">Undo</button>
      <button class="btn btn-small" id="btn-goto">Go to</button>
      <input class="goto-input" id="goto-input" placeholder="offset (hex)">
      <span style="flex:1"></span>
      <span id="status-selection" style="font-size:0.75rem;color:var(--text-dim)"></span>
    </div>

    <div class="hex-view" id="hex-view">
      <table class="hex-table" id="hex-table">
        <thead id="hex-thead"></thead>
        <tbody id="hex-tbody"></tbody>
      </table>
    </div>

    <div class="status-bar">
      <span id="status-file">No file loaded</span>
      <span id="status-size"></span>
    </div>
  </div>

  <script>
    let data = null;
    let fileName = 'untitled.bin';
    let history = [];
    let selectedOffset = -1;
    let editingCell = null;

    const BYTES_PER_ROW = 16;
    const MAX_RENDER = 4096;

    const hexView = document.getElementById('hex-view');
    const tbody = document.getElementById('hex-tbody');
    const thead = document.getElementById('hex-thead');
    const statusFile = document.getElementById('status-file');
    const statusSize = document.getElementById('status-size');
    const statusSel = document.getElementById('status-selection');
    const fileDropEl = document.getElementById('file-drop');
    const filePickerEl = document.getElementById('file-picker');
    const fileInfoEl = document.getElementById('file-info');
    const gotoInput = document.getElementById('goto-input');

    // Build table header
    function buildHeader() {
      let html = '<tr><th class="offset-header">Offset</th>';
      for (let i = 0; i < BYTES_PER_ROW; i++) {
        if (i === 8) html += '<th class="hex-gap"></th>';
        html += `<th class="hex-header">${i.toString(16).toUpperCase()}</th>`;
      }
      html += '<th class="ascii-header">ASCII</th></tr>';
      thead.innerHTML = html;
    }
    buildHeader();

    // File handling
    fileDropEl.addEventListener('click', () => filePickerEl.click());
    fileDropEl.addEventListener('dragover', e => { e.preventDefault(); fileDropEl.classList.add('dragover'); });
    fileDropEl.addEventListener('dragleave', () => fileDropEl.classList.remove('dragover'));
    fileDropEl.addEventListener('drop', e => {
      e.preventDefault();
      fileDropEl.classList.remove('dragover');
      if (e.dataTransfer.files.length) loadFile(e.dataTransfer.files[0]);
    });
    filePickerEl.addEventListener('change', () => {
      if (filePickerEl.files.length) loadFile(filePickerEl.files[0]);
    });

    function loadFile(file) {
      fileName = file.name;
      const reader = new FileReader();
      reader.onload = () => {
        data = new Uint8Array(reader.result);
        history = [];
        selectedOffset = -1;
        fileInfoEl.textContent = `${file.name} (${formatSize(file.size)})`;
        fileInfoEl.classList.remove('hidden');
        updateStatus();
        renderVisible();
      };
      reader.readAsArrayBuffer(file);
    }

    // New empty buffer
    document.getElementById('btn-new').addEventListener('click', () => {
      data = new Uint8Array(256);
      fileName = 'untitled.bin';
      history = [];
      selectedOffset = -1;
      fileInfoEl.classList.add('hidden');
      updateStatus();
      renderVisible();
    });

    function formatSize(bytes) {
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
      return (bytes / 1048576).toFixed(1) + ' MB';
    }

    function updateStatus() {
      if (!data) {
        statusFile.textContent = 'No file loaded';
        statusSize.textContent = '';
        return;
      }
      statusFile.textContent = fileName;
      statusSize.textContent = `${data.length} bytes (0x${data.length.toString(16).toUpperCase()})`;
    }

    function updateSelection() {
      if (selectedOffset < 0 || !data) {
        statusSel.textContent = '';
        return;
      }
      const b = data[selectedOffset];
      statusSel.textContent = `Offset: 0x${selectedOffset.toString(16).toUpperCase()} | Dec: ${b} | Hex: 0x${b.toString(16).padStart(2, '0').toUpperCase()} | Bin: ${b.toString(2).padStart(8, '0')}`;
    }

    // Virtual scrolling: only render visible rows
    let renderStart = 0;

    function renderVisible() {
      if (!data) { tbody.innerHTML = ''; return; }

      const totalRows = Math.ceil(data.length / BYTES_PER_ROW);
      const rowHeight = 24;
      const viewHeight = hexView.clientHeight - 28; // minus header
      const scrollTop = hexView.scrollTop;
      const firstVisible = Math.max(0, Math.floor(scrollTop / rowHeight) - 2);
      const visibleCount = Math.ceil(viewHeight / rowHeight) + 4;
      const lastVisible = Math.min(totalRows, firstVisible + visibleCount);

      renderStart = firstVisible;

      const topPad = firstVisible * rowHeight;
      const bottomPad = Math.max(0, (totalRows - lastVisible) * rowHeight);

      let html = '';
      if (topPad > 0) html += `<tr style="height:${topPad}px"><td colspan="${BYTES_PER_ROW + 3}"></td></tr>`;

      for (let row = firstVisible; row < lastVisible; row++) {
        const offset = row * BYTES_PER_ROW;
        html += `<tr class="hex-row" data-offset="${offset}">`;
        html += `<td class="hex-offset">${offset.toString(16).padStart(8, '0')}</td>`;

        let asciiHtml = '';
        for (let i = 0; i < BYTES_PER_ROW; i++) {
          if (i === 8) html += '<td></td>';
          const idx = offset + i;
          if (idx < data.length) {
            const b = data[idx];
            const cls = b === 0 ? 'null' : (b >= 32 && b < 127) ? 'printable' : 'high';
            const sel = idx === selectedOffset ? ' selected' : '';
            html += `<td class="hex-cell ${cls}${sel}" data-idx="${idx}">${b.toString(16).padStart(2, '0')}</td>`;

            const ch = (b >= 32 && b < 127) ? escapeHtml(String.fromCharCode(b)) : '.';
            asciiHtml += `<span class="ascii-char ${cls}${sel}" data-idx="${idx}">${ch}</span>`;
          } else {
            html += '<td class="hex-cell"></td>';
            asciiHtml += ' ';
          }
        }
        html += `<td class="ascii-cell">${asciiHtml}</td></tr>`;
      }

      if (bottomPad > 0) html += `<tr style="height:${bottomPad}px"><td colspan="${BYTES_PER_ROW + 3}"></td></tr>`;

      tbody.innerHTML = html;
    }

    function escapeHtml(s) {
      return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    hexView.addEventListener('scroll', renderVisible);

    // Click to select
    tbody.addEventListener('click', e => {
      const cell = e.target.closest('[data-idx]');
      if (!cell || !data) return;
      const idx = parseInt(cell.dataset.idx);
      selectedOffset = idx;
      updateSelection();
      renderVisible();
    });

    // Double-click to edit hex cell
    tbody.addEventListener('dblclick', e => {
      const cell = e.target.closest('.hex-cell[data-idx]');
      if (!cell || !data) return;
      startEdit(cell);
    });

    // Type to edit when selected
    document.addEventListener('keydown', e => {
      if (!data || selectedOffset < 0) return;
      if (editingCell) return;
      if (e.target.tagName === 'INPUT') return;

      // Arrow keys
      if (e.key === 'ArrowRight') {
        e.preventDefault();
        selectedOffset = Math.min(data.length - 1, selectedOffset + 1);
        updateSelection(); renderVisible(); scrollToOffset(selectedOffset);
        return;
      }
      if (e.key === 'ArrowLeft') {
        e.preventDefault();
        selectedOffset = Math.max(0, selectedOffset - 1);
        updateSelection(); renderVisible(); scrollToOffset(selectedOffset);
        return;
      }
      if (e.key === 'ArrowDown') {
        e.preventDefault();
        selectedOffset = Math.min(data.length - 1, selectedOffset + BYTES_PER_ROW);
        updateSelection(); renderVisible(); scrollToOffset(selectedOffset);
        return;
      }
      if (e.key === 'ArrowUp') {
        e.preventDefault();
        selectedOffset = Math.max(0, selectedOffset - BYTES_PER_ROW);
        updateSelection(); renderVisible(); scrollToOffset(selectedOffset);
        return;
      }

      // Start editing on hex keypress
      if (/^[0-9a-fA-F]$/.test(e.key)) {
        e.preventDefault();
        const cell = tbody.querySelector(`.hex-cell[data-idx="${selectedOffset}"]`);
        if (cell) startEdit(cell, e.key);
      }

      // Delete sets byte to 0
      if (e.key === 'Delete' || e.key === 'Backspace') {
        e.preventDefault();
        setByte(selectedOffset, 0);
      }
    });

    function startEdit(cell, initialKey) {
      if (editingCell) return;
      const idx = parseInt(cell.dataset.idx);
      editingCell = cell;
      const input = document.createElement('input');
      input.className = 'hex-edit-input';
      input.maxLength = 2;
      input.value = initialKey || '';
      cell.style.position = 'relative';
      cell.textContent = '';
      cell.appendChild(input);
      input.focus();

      function commit() {
        const val = parseInt(input.value, 16);
        editingCell = null;
        if (!isNaN(val) && input.value.length > 0) {
          setByte(idx, val & 0xFF);
          selectedOffset = Math.min(data.length - 1, idx + 1);
          updateSelection();
        }
        renderVisible();
      }

      input.addEventListener('blur', commit);
      input.addEventListener('keydown', e => {
        if (e.key === 'Enter') { e.preventDefault(); input.blur(); }
        if (e.key === 'Escape') { editingCell = null; renderVisible(); }
        if (e.key === 'Tab') { e.preventDefault(); input.blur(); }
        // Auto-commit when 2 chars entered
      });
      input.addEventListener('input', () => {
        input.value = input.value.replace(/[^0-9a-fA-F]/g, '');
        if (input.value.length >= 2) input.blur();
      });
    }

    function setByte(idx, value) {
      if (!data || idx < 0 || idx >= data.length) return;
      history.push({ idx, old: data[idx] });
      if (history.length > 10000) history.shift();
      data[idx] = value;
    }

    // Undo
    document.getElementById('btn-undo').addEventListener('click', () => {
      if (!history.length || !data) return;
      const entry = history.pop();
      data[entry.idx] = entry.old;
      selectedOffset = entry.idx;
      updateSelection();
      renderVisible();
    });

    // Save
    document.getElementById('btn-save').addEventListener('click', () => {
      if (!data) return;
      const blob = new Blob([data], { type: 'application/octet-stream' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = fileName;
      a.click();
      URL.revokeObjectURL(url);
    });

    // Go to offset
    document.getElementById('btn-goto').addEventListener('click', goToOffset);
    gotoInput.addEventListener('keydown', e => {
      if (e.key === 'Enter') goToOffset();
    });

    function goToOffset() {
      if (!data) return;
      const val = gotoInput.value.trim().replace(/^0x/i, '');
      const offset = parseInt(val, 16);
      if (isNaN(offset) || offset < 0 || offset >= data.length) return;
      selectedOffset = offset;
      updateSelection();
      scrollToOffset(offset);
      renderVisible();
    }

    function scrollToOffset(offset) {
      const row = Math.floor(offset / BYTES_PER_ROW);
      const rowHeight = 24;
      const targetScroll = row * rowHeight - hexView.clientHeight / 2 + rowHeight;
      const current = hexView.scrollTop;
      const viewTop = current;
      const viewBottom = current + hexView.clientHeight - 28;
      const rowTop = row * rowHeight;
      if (rowTop < viewTop || rowTop > viewBottom) {
        hexView.scrollTop = targetScroll;
      }
    }

    // Ctrl+Z undo
    document.addEventListener('keydown', e => {
      if ((e.ctrlKey || e.metaKey) && e.key === 'z') {
        e.preventDefault();
        document.getElementById('btn-undo').click();
      }
    });
  </script>
  <script>if('serviceWorker' in navigator)navigator.serviceWorker.register('../sw.js');</script>
</body>
</html>
