<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#38bdf8">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/svg+xml" href="../icons/uweek.svg">
  <link rel="apple-touch-icon" href="../icons/uweek.png">
  <title>uweek</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0e1a;
      --surface: #111827;
      --surface2: #1a2236;
      --border: #1e2940;
      --text: #d0d8e8;
      --text-dim: #6b7a94;
      --accent: #38bdf8;
      --accent-dim: rgba(56, 189, 248, 0.1);
      --radius: 8px;
    }

    body {
      font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 40px 20px;
    }

    .container { max-width: 720px; width: 100%; }

    h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 4px; }
    .subtitle { color: var(--text-dim); font-size: 0.85rem; margin-bottom: 24px; }

    .week-display {
      text-align: center;
      padding: 40px 20px;
      margin-bottom: 24px;
    }

    .week-number {
      font-size: 6rem;
      font-weight: 700;
      color: var(--accent);
      line-height: 1;
      margin-bottom: 8px;
    }

    .week-label {
      font-size: 1.1rem;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .sep { height: 1px; background: var(--border); margin: 20px 0; }

    .info-grid {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .info-row {
      display: flex;
      align-items: stretch;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .info-label {
      display: flex;
      align-items: center;
      width: 160px;
      min-width: 160px;
      padding: 10px 12px;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--accent);
      background: var(--surface2);
      border-right: 1px solid var(--border);
    }

    .info-value {
      flex: 1;
      padding: 10px 12px;
      font-size: 0.9rem;
      line-height: 1.5;
    }

    .date-input-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }

    .date-input-row label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--accent);
      white-space: nowrap;
    }

    input[type="date"] {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: inherit;
      font-size: 0.9rem;
      padding: 8px 12px;
      outline: none;
      transition: border-color 0.15s;
    }
    input[type="date"]:focus { border-color: var(--accent); }
    input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(0.7); }

    .today-btn {
      background: var(--accent-dim);
      border: 1px solid var(--accent);
      border-radius: var(--radius);
      color: var(--accent);
      font-family: inherit;
      font-size: 0.8rem;
      padding: 8px 14px;
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
    }
    .today-btn:hover { background: rgba(56, 189, 248, 0.2); }

    .progress-bar-bg {
      width: 100%;
      height: 8px;
      background: var(--surface);
      border-radius: 4px;
      overflow: hidden;
      margin-top: 4px;
    }

    .progress-bar-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 4px;
      transition: width 0.3s ease;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>uweek</h1>
    <p class="subtitle">Current week number and year progress. All data stays on your device.</p>

    <div class="date-input-row">
      <label for="date-input">Date</label>
      <input type="date" id="date-input">
      <button class="today-btn" id="btn-today">Today</button>
    </div>

    <div class="week-display">
      <div class="week-number" id="week-num"></div>
      <div class="week-label" id="week-label"></div>
    </div>

    <div class="info-grid" id="info"></div>
  </div>

  <script>
    const dateInput = document.getElementById('date-input');
    const weekNum = document.getElementById('week-num');
    const weekLabel = document.getElementById('week-label');
    const info = document.getElementById('info');

    function getISOWeek(date) {
      const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
      d.setUTCDate(d.getUTCDate() + 4 - (d.getUTCDay() || 7));
      const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
      const weekNo = Math.ceil(((d - yearStart) / 86400000 + 1) / 7);
      return { week: weekNo, year: d.getUTCFullYear() };
    }

    function getDayOfYear(date) {
      const start = new Date(date.getFullYear(), 0, 0);
      const diff = date - start;
      return Math.floor(diff / 86400000);
    }

    function getTotalWeeksInYear(year) {
      const dec28 = new Date(Date.UTC(year, 11, 28));
      return getISOWeek(dec28).week;
    }

    function isLeapYear(year) {
      return (year % 4 === 0 && year % 100 !== 0) || (year % 400 === 0);
    }

    function getWeekDateRange(year, week) {
      // Find Jan 4 of the year (always in week 1)
      const jan4 = new Date(Date.UTC(year, 0, 4));
      const dayOfWeek = jan4.getUTCDay() || 7;
      // Monday of week 1
      const week1Monday = new Date(jan4);
      week1Monday.setUTCDate(jan4.getUTCDate() - dayOfWeek + 1);
      // Monday of target week
      const targetMonday = new Date(week1Monday);
      targetMonday.setUTCDate(week1Monday.getUTCDate() + (week - 1) * 7);
      const targetSunday = new Date(targetMonday);
      targetSunday.setUTCDate(targetMonday.getUTCDate() + 6);
      const fmt = d => d.toISOString().slice(0, 10);
      return `${fmt(targetMonday)} — ${fmt(targetSunday)}`;
    }

    function update(date) {
      const { week, year } = getISOWeek(date);
      const totalWeeks = getTotalWeeksInYear(date.getFullYear());
      const dayOfYear = getDayOfYear(date);
      const totalDays = isLeapYear(date.getFullYear()) ? 366 : 365;
      const yearProgress = ((dayOfYear / totalDays) * 100).toFixed(1);
      const weekRange = getWeekDateRange(year, week);

      weekNum.textContent = week;
      weekLabel.textContent = `Week ${week} of ${year}`;

      const dayNames = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];

      info.innerHTML = `
        <div class="info-row">
          <div class="info-label">Date</div>
          <div class="info-value">${date.toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' })}</div>
        </div>
        <div class="info-row">
          <div class="info-label">ISO Week</div>
          <div class="info-value">${year}-W${String(week).padStart(2, '0')}</div>
        </div>
        <div class="info-row">
          <div class="info-label">Week Range</div>
          <div class="info-value">${weekRange}</div>
        </div>
        <div class="info-row">
          <div class="info-label">Day of Year</div>
          <div class="info-value">${dayOfYear} / ${totalDays}</div>
        </div>
        <div class="info-row">
          <div class="info-label">Weeks in Year</div>
          <div class="info-value">${totalWeeks}</div>
        </div>
        <div class="info-row">
          <div class="info-label">Quarter</div>
          <div class="info-value">Q${Math.ceil((date.getMonth() + 1) / 3)}</div>
        </div>
        <div class="info-row">
          <div class="info-label">Year Progress</div>
          <div class="info-value">
            ${yearProgress}%
            <div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${yearProgress}%"></div></div>
          </div>
        </div>
      `;
    }

    function setToday() {
      const today = new Date();
      dateInput.value = today.toISOString().slice(0, 10);
      update(today);
    }

    dateInput.addEventListener('input', () => {
      const val = dateInput.value;
      if (val) {
        const parts = val.split('-');
        update(new Date(+parts[0], +parts[1] - 1, +parts[2]));
      }
    });

    document.getElementById('btn-today').addEventListener('click', setToday);

    setToday();
  </script>
</body>
<script>if('serviceWorker' in navigator)navigator.serviceWorker.register('../sw.js');</script>
</html>
