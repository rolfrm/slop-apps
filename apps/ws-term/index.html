<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WS Term</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0e1a;
      --surface: #111827;
      --surface2: #1a2236;
      --border: #1e2940;
      --text: #d0d8e8;
      --text-dim: #6b7a94;
      --accent: #34d399;
      --accent-dim: rgba(52, 211, 153, 0.1);
      --danger: #f87171;
      --warn: #fbbf24;
      --radius: 8px;
    }

    body {
      font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace; //test
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 14px;
      gap: 10px;
    }

    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px;
    }

    .top-bar, .status-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    h1 {
      font-size: 1rem;
      font-weight: 700;
      margin-right: 4px;
    }

    .input, .btn {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: inherit;
      font-size: 0.85rem;
      padding: 9px 10px;
    }

    .input {
      flex: 1;
      min-width: 200px;
    }

    .input:focus {
      outline: none;
      border-color: var(--accent);
    }

    .btn {
      background: var(--surface2);
      color: var(--accent);
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }

    .btn:hover {
      background: var(--accent-dim);
      border-color: var(--accent);
    }

    .btn.danger { color: var(--danger); }

    .status-bar {
      font-size: 0.8rem;
      color: var(--text-dim);
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 6px 10px;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--text-dim);
      box-shadow: 0 0 10px transparent;
    }

    .dot.connected { background: var(--accent); box-shadow: 0 0 10px rgba(52, 211, 153, 0.45); }
    .dot.connecting { background: var(--warn); box-shadow: 0 0 10px rgba(251, 191, 36, 0.35); }
    .dot.closed { background: var(--danger); box-shadow: 0 0 10px rgba(248, 113, 113, 0.35); }

    .terminal-wrap {
      flex: 1;
      min-height: 320px;
      background: linear-gradient(180deg, #0d1526 0%, #0a0e1a 100%);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px;
      overflow: hidden;
    }

    #terminal {
      width: 100%;
      height: 100%;
    }

    .hint {
      font-size: 0.75rem;
      color: var(--text-dim);
    }

    @media (max-width: 700px) {
      .top-bar, .status-bar { flex-direction: column; align-items: stretch; }
      .input { min-width: 0; width: 100%; }
    }
  </style>
</head>
<body>
  <div class="panel">
    <div class="top-bar">
      <h1>WS Term</h1>
      <input id="urlInput" class="input" placeholder="ws://localhost:8080" spellcheck="false" autocomplete="off">
      <button id="connectBtn" class="btn">Connect</button>
      <button id="disconnectBtn" class="btn danger">Disconnect</button>
    </div>
  </div>

  <div class="status-bar">
    <div class="status-pill"><span id="statusDot" class="dot closed"></span><span id="statusText">Disconnected</span></div>
    <div id="statusUrl" class="hint">No websocket connected</div>
  </div>

  <div class="terminal-wrap">
    <div id="terminal"></div>
  </div>

  <div class="hint">Extremely basic xterm.js websocket bridge with manual stdin/stdout wiring.</div>

  <script type="module">
    import { Terminal } from 'https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/+esm';

    const urlInput = document.getElementById('urlInput');
    const connectBtn = document.getElementById('connectBtn');
    const disconnectBtn = document.getElementById('disconnectBtn');
    const statusDot = document.getElementById('statusDot');
    const statusText = document.getElementById('statusText');
    const statusUrl = document.getElementById('statusUrl');
    const terminalEl = document.getElementById('terminal');

    let socket = null;
    let isVisible = true;
    const decoder = new TextDecoder();

    const terminal = new Terminal({
      cursorBlink: true,
      fontFamily: 'SF Mono, Fira Code, Consolas, monospace',
      fontSize: 13,
      theme: {
        background: '#0a0e1a',
        foreground: '#d0d8e8',
        cursor: '#34d399',
        black: '#0a0e1a',
        red: '#f87171',
        green: '#34d399',
        yellow: '#fbbf24',
        blue: '#60a5fa',
        magenta: '#c084fc',
        cyan: '#22d3ee',
        white: '#d0d8e8',
        brightBlack: '#6b7a94',
        brightRed: '#fca5a5',
        brightGreen: '#86efac',
        brightYellow: '#fde68a',
        brightBlue: '#93c5fd',
        brightMagenta: '#d8b4fe',
        brightCyan: '#67e8f9',
        brightWhite: '#f8fafc'
      }
    });

    terminal.open(terminalEl);
    terminal.writeln('WS Term ready.');
    terminal.writeln('Enter a websocket URL, then connect.');
    terminal.write('\r\n');

    function setStatus(state, text, detail) {
      statusDot.className = 'dot ' + state;
      statusText.textContent = text;
      statusUrl.textContent = detail;
    }

    function disconnect(showMessage = true) {
      if (socket) {
        const current = socket;
        socket = null;
        current.close();
      }
      setStatus('closed', 'Disconnected', 'No websocket connected!!');
      if (showMessage) terminal.writeln('\r\n[disconnected]');
    }

    async function decodeMessageData(data) {
      if (typeof data === 'string') return data;
      if (data instanceof ArrayBuffer) return decoder.decode(new Uint8Array(data));
      if (data instanceof Blob) return decoder.decode(new Uint8Array(await data.arrayBuffer()));
      if (ArrayBuffer.isView(data)) return decoder.decode(new Uint8Array(data.buffer, data.byteOffset, data.byteLength));
      return String(data);
    }

    function connect() {
      const url = urlInput.value.trim();
      if (!url) {
        terminal.writeln('\r\n[error] websocket URL required');
        return;
      }

      localStorage.setItem('ws_term_url', url);
      disconnect(false);
      setStatus('connecting', 'Connecting...', url);
      terminal.writeln(`\r\n[connecting] ${url}`);

      let webSocket;
      try {
        webSocket = new WebSocket(url);
        webSocket.binaryType = 'arraybuffer';
      } catch (err) {
        socket = null;
        setStatus('closed', 'Disconnected', 'No websocket connected');
        terminal.writeln(`\r\n[error] ${err.message}`);
        return;
      }

      socket = webSocket;

      webSocket.addEventListener('open', () => {
        if (socket !== webSocket) return;
        setStatus('connected', 'Connected', url);
        terminal.writeln('\r\n[connected]');
        terminal.focus();
      });

      webSocket.addEventListener('message', async (event) => {
        if (socket !== webSocket) return;
        const text = await decodeMessageData(event.data);
        terminal.write(text);
      });

      webSocket.addEventListener('close', () => {
        if (socket === webSocket) socket = null;
        setStatus('closed', 'Disconnected', 'No websocket connected');
        terminal.writeln('\r\n[closed]');
      });

      webSocket.addEventListener('error', () => {
        terminal.writeln('\r\n[error] websocket error');
      });
    }

    terminal.onData((data) => {
      if (socket && socket.readyState === WebSocket.OPEN) {
        socket.send(data);
      }
    });

    connectBtn.addEventListener('click', connect);
    disconnectBtn.addEventListener('click', () => disconnect(true));
    urlInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') connect();
    });

    const savedUrl = localStorage.getItem('ws_term_url');
    if (savedUrl) urlInput.value = savedUrl;

    window.addEventListener('resize', () => {
      if (isVisible) terminal.refresh(0, terminal.rows - 1);
    });

    window.addEventListener('message', (e) => {
      if (e.data?.type === 'slopos-visibility') {
        isVisible = e.data.state === 'active';
        if (isVisible) {
          setTimeout(() => terminal.refresh(0, terminal.rows - 1), 0);
        }
      }
    });

    window.parent.postMessage({ type: 'slopos-get-visibility' }, '*');
  </script>
</body>
</html>
