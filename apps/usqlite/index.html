<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#4a9eff">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/svg+xml" href="../icons/usqlite.svg">
<link rel="apple-touch-icon" href="../icons/usqlite.png">
<title>usqlitebrowser</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap');

  :root {
    --bg: #080c18;
    --bg-surface: #0c1222;
    --bg-elevated: #111a30;
    --bg-hover: #162040;
    --border: #2a4070;
    --text: #d0daf0;
    --text-dim: #7a90aa;
    --accent: #00fff9;
    --accent-dim: #0e9a97;
    --accent-glow: rgba(0, 255, 249, 0.15);
    --pink: #ff2975;
    --pink-glow: rgba(255, 41, 117, 0.2);
    --green: #39ff14;
    --red: #ff2975;
    --yellow: #ffe66d;
    --orange: #ff6c11;
    --blue: #4d8bff;
    --blue-glow: rgba(77, 139, 255, 0.2);
    --tab-active: #111a30;
    --scrollbar: #2a4070;
    --scrollbar-hover: #2a4478;
    --grid-line: rgba(0, 255, 249, 0.06);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'JetBrains Mono', 'SF Mono', 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
    font-size: 13px;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* Subtle CRT scanline overlay */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 10000;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0, 0, 0, 0.03) 2px,
      rgba(0, 0, 0, 0.03) 4px
    );
  }

  ::selection {
    background: var(--pink);
    color: #fff;
  }

  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--scrollbar); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--scrollbar-hover); }

  /* Header */
  #toolbar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 12px;
    background: var(--bg-surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  #toolbar h1 {
    font-size: 14px;
    font-weight: 700;
    color: var(--accent);
    margin-right: 12px;
    text-shadow: 0 0 10px var(--accent), 0 0 30px rgba(0, 255, 249, 0.3);
    letter-spacing: 1px;
  }

  .toolbar-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 4px 12px;
    border-radius: 2px;
    cursor: pointer;
    font-family: inherit;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    transition: all 0.2s;
  }
  .toolbar-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: var(--accent-glow);
    text-shadow: 0 0 8px var(--accent);
    box-shadow: 0 0 8px rgba(0, 255, 249, 0.1), inset 0 0 8px rgba(0, 255, 249, 0.05);
  }

  .toolbar-separator {
    width: 1px;
    height: 20px;
    background: var(--border);
  }

  #db-name {
    color: var(--text-dim);
    font-size: 11px;
    margin-left: 4px;
  }

  /* Main layout */
  #main {
    display: flex;
    flex: 1;
    min-height: 0;
  }

  /* Tree view (left panel) */
  #tree-panel {
    width: 260px;
    min-width: 180px;
    background: var(--bg-surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    overflow: hidden;
  }

  #tree-panel .panel-header {
    padding: 8px 12px;
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--blue);
    border-bottom: 1px solid var(--border);
    text-shadow: 0 0 10px var(--blue-glow);
  }

  #tree-content {
    flex: 1;
    overflow-y: auto;
    padding: 4px 0;
  }

  .tree-item {
    padding: 3px 12px 3px 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    user-select: none;
    transition: all 0.1s;
    white-space: nowrap;
    font-size: 12px;
  }
  .tree-item:hover {
    background: var(--bg-hover);
    box-shadow: inset 2px 0 0 var(--accent);
  }

  .tree-group {
    padding: 8px 12px 4px 12px;
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--text-dim);
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    user-select: none;
  }

  .tree-group .chevron {
    font-size: 10px;
    transition: transform 0.15s;
    color: var(--blue);
  }
  .tree-group.collapsed .chevron { transform: rotate(-90deg); }
  .tree-group.collapsed + .tree-children { display: none; }

  .tree-table-icon { color: var(--pink); font-size: 11px; }
  .tree-col-icon { color: var(--border); font-size: 10px; margin-left: 8px; }
  .tree-col-type { color: var(--text-dim); font-size: 10px; margin-left: auto; font-style: italic; }
  .tree-meta { padding-left: 28px; font-size: 10px; color: var(--text-dim); letter-spacing: 0.3px; }

  .tree-table-name {
    color: var(--text);
    font-weight: 500;
  }
  .tree-table-name:hover {
    color: var(--accent);
    text-shadow: 0 0 8px var(--accent-glow);
  }

  .tree-col-name { color: var(--text-dim); font-size: 11px; }
  .tree-col-pk {
    color: var(--yellow);
    font-size: 9px;
    font-weight: 700;
    text-shadow: 0 0 6px rgba(255, 230, 109, 0.4);
  }

  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--bg-elevated);
    border: 1px solid var(--accent-dim);
    color: var(--accent);
    padding: 8px 16px;
    border-radius: 2px;
    font-size: 11px;
    font-family: inherit;
    z-index: 9999;
    text-shadow: 0 0 8px var(--accent);
    box-shadow: 0 0 20px rgba(0, 255, 249, 0.1), inset 0 0 20px rgba(0, 255, 249, 0.03);
    animation: toastIn 0.2s ease-out, toastOut 0.3s 1.5s ease-in forwards;
  }
  @keyframes toastIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes toastOut { from { opacity: 1; } to { opacity: 0; } }

  /* Right side */
  #right-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
  }

  /* Horizontal resize handle */
  .resize-handle-h {
    width: 3px;
    cursor: col-resize;
    background: transparent;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .resize-handle-h:hover, .resize-handle-h.active {
    background: var(--pink);
    box-shadow: 0 0 8px var(--pink-glow);
  }

  /* Vertical resize handle */
  .resize-handle-v {
    height: 3px;
    cursor: row-resize;
    background: transparent;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .resize-handle-v:hover, .resize-handle-v.active {
    background: var(--pink);
    box-shadow: 0 0 8px var(--pink-glow);
  }

  /* Table view (top) */
  #table-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-height: 120px;
    overflow: hidden;
  }

  #table-panel .panel-header {
    padding: 6px 12px;
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--blue);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--bg-surface);
    flex-shrink: 0;
    text-shadow: 0 0 10px var(--blue-glow);
  }

  #result-info { font-weight: 400; color: var(--text-dim); text-shadow: none; }

  #table-container {
    flex: 1;
    overflow: auto;
    background: var(--bg);
  }

  #result-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
  }

  #result-table thead { position: sticky; top: 0; z-index: 1; }

  #result-table th {
    background: var(--bg-surface);
    padding: 6px 12px;
    text-align: left;
    font-weight: 600;
    color: var(--accent);
    border-bottom: 1px solid var(--accent-dim);
    border-right: 1px solid var(--border);
    white-space: nowrap;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    text-shadow: 0 0 8px var(--accent-glow);
  }

  #result-table td {
    padding: 4px 12px;
    border-bottom: 1px solid rgba(30, 48, 88, 0.5);
    border-right: 1px solid rgba(30, 48, 88, 0.5);
    white-space: nowrap;
    max-width: 300px;
    overflow: hidden;
    text-overflow: ellipsis;
    color: var(--text);
  }

  #result-table tbody tr:hover {
    background: var(--bg-hover);
    box-shadow: inset 2px 0 0 var(--pink);
  }

  #result-table tbody tr:nth-child(even) {
    background: rgba(6, 10, 22, 0.4);
  }
  #result-table tbody tr:nth-child(even):hover {
    background: var(--bg-hover);
  }

  .null-value { color: var(--text-dim); font-style: italic; opacity: 0.75; }

  #table-placeholder {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: var(--text-dim);
    font-size: 12px;
    letter-spacing: 0.5px;
  }

  #error-display {
    padding: 12px;
    color: var(--red);
    font-size: 12px;
    white-space: pre-wrap;
    background: rgba(255, 41, 117, 0.05);
    text-shadow: 0 0 8px var(--pink-glow);
    border-left: 2px solid var(--red);
  }

  /* Script panel (bottom) */
  #script-panel {
    height: 260px;
    min-height: 100px;
    display: flex;
    flex-direction: column;
    background: var(--bg-surface);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }

  #tab-bar {
    display: flex;
    align-items: center;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
    flex-shrink: 0;
  }

  .tab {
    padding: 6px 12px;
    font-size: 11px;
    font-family: inherit;
    color: var(--text-dim);
    background: transparent;
    border: none;
    border-right: 1px solid var(--border);
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    white-space: nowrap;
    transition: all 0.15s;
    position: relative;
    letter-spacing: 0.3px;
  }
  .tab:hover { background: var(--bg-hover); color: var(--text); }
  .tab.active {
    background: var(--tab-active);
    color: var(--accent);
    text-shadow: 0 0 8px var(--accent-glow);
    border-bottom: 2px solid var(--pink);
    box-shadow: 0 2px 8px var(--pink-glow);
  }

  .tab .close-tab {
    font-size: 14px;
    line-height: 1;
    color: var(--text-dim);
    border-radius: 2px;
    width: 16px;
    height: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.1s;
  }
  .tab .close-tab:hover { color: var(--red); background: var(--pink-glow); text-shadow: 0 0 6px var(--red); }

  #add-tab-btn {
    padding: 6px 10px;
    background: transparent;
    border: none;
    color: var(--text-dim);
    cursor: pointer;
    font-size: 16px;
    font-family: inherit;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  #add-tab-btn:hover { color: var(--green); text-shadow: 0 0 8px rgba(57, 255, 20, 0.4); }

  #editor-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-height: 0;
  }

  #sql-editor {
    flex: 1;
    background: var(--bg);
    color: var(--green);
    border: none;
    padding: 12px;
    font-family: inherit;
    font-size: 13px;
    resize: none;
    outline: none;
    line-height: 1.6;
    tab-size: 2;
    caret-color: var(--accent);
    text-shadow: 0 0 1px rgba(57, 255, 20, 0.3);
  }
  #sql-editor::placeholder { color: var(--text-dim); text-shadow: none; }
  #sql-editor:focus {
    box-shadow: inset 0 0 30px rgba(0, 255, 249, 0.02);
  }

  #editor-toolbar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 12px;
    background: var(--bg-surface);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }

  #run-btn {
    background: transparent;
    color: var(--accent);
    border: 1px solid var(--accent-dim);
    padding: 4px 16px;
    border-radius: 2px;
    font-family: inherit;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
  }
  #run-btn:hover {
    border-color: var(--accent);
    background: var(--accent-glow);
    text-shadow: 0 0 8px var(--accent);
    box-shadow: 0 0 12px rgba(0, 255, 249, 0.15), inset 0 0 12px rgba(0, 255, 249, 0.05);
  }
  #run-btn:disabled { opacity: 0.3; cursor: not-allowed; border-color: var(--border); color: var(--text-dim); }

  #run-hint {
    color: var(--text-dim);
    font-size: 10px;
    letter-spacing: 0.5px;
  }

  #exec-time {
    margin-left: auto;
    color: var(--text-dim);
    font-size: 10px;
  }

  /* Drag-and-drop overlay */
  #drop-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(8, 12, 24, 0.95);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 16px;
  }
  #drop-overlay.visible { display: flex; }
  #drop-overlay .drop-icon {
    font-size: 48px;
    color: var(--accent);
    text-shadow: 0 0 30px var(--accent), 0 0 60px rgba(0, 255, 249, 0.3);
    font-weight: 700;
  }
  #drop-overlay .drop-text {
    font-size: 16px;
    color: var(--accent);
    text-shadow: 0 0 20px var(--accent), 0 0 40px rgba(0, 255, 249, 0.3);
    letter-spacing: 2px;
    text-transform: uppercase;
    font-weight: 600;
  }
  #drop-overlay .drop-hint {
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 1px;
  }

  /* Status bar */
  #status-bar {
    padding: 3px 12px;
    background: var(--bg-surface);
    border-top: 1px solid var(--border);
    font-size: 10px;
    color: var(--text-dim);
    display: flex;
    align-items: center;
    gap: 16px;
    flex-shrink: 0;
    letter-spacing: 0.5px;
  }
  #status-bar .status-accent {
    color: var(--accent);
    text-shadow: 0 0 6px var(--accent-glow);
  }

  /* Tab rename input */
  .tab-rename-input {
    background: var(--bg);
    border: 1px solid var(--pink);
    color: var(--text);
    font-family: inherit;
    font-size: 11px;
    padding: 0 4px;
    width: 100px;
    outline: none;
    border-radius: 2px;
    box-shadow: 0 0 8px var(--pink-glow);
  }

  /* Prompt prefix for terminal feel */
  #sql-editor {
    background-image:
      linear-gradient(var(--grid-line) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
    background-size: 100% 20.8px, 20.8px 100%;
    background-position: 0 11px;
  }
</style>
</head>
<body>

<!-- Drop overlay -->
<div id="drop-overlay">
  <div class="drop-icon">&gt;_</div>
  <div class="drop-text">Drop database file</div>
  <div class="drop-hint">.db / .sqlite / .sqlite3</div>
</div>

<!-- Toolbar -->
<div id="toolbar">
  <h1>&gt;_ usqlitebrowser</h1>
  <button class="toolbar-btn" id="open-btn">Open DB</button>
  <button class="toolbar-btn" id="create-btn">New DB</button>
  <button class="toolbar-btn" id="export-btn">Export DB</button>
  <div class="toolbar-separator"></div>
  <span id="db-name">No database loaded</span>
  <span style="margin-left:auto;font-size:11px;color:#6b7a94;">All data stays on your device</span>
</div>

<!-- Main layout -->
<div id="main">
  <!-- Tree panel -->
  <div id="tree-panel">
    <div class="panel-header">Schema</div>
    <div id="tree-content">
      <div id="tree-placeholder" style="padding:24px 12px;color:var(--text-dim);font-size:11px;text-align:center;letter-spacing:0.5px;">
        &gt; open or drop a .db file<br>&gt; to browse its schema
      </div>
    </div>
  </div>

  <!-- Horizontal resize -->
  <div class="resize-handle-h" id="resize-h"></div>

  <!-- Right panel -->
  <div id="right-panel">
    <!-- Table view -->
    <div id="table-panel">
      <div class="panel-header">
        <span>Results</span>
        <span id="result-info"></span>
      </div>
      <div id="table-container">
        <div id="table-placeholder">&gt; run a query to see results</div>
        <div id="error-display" style="display:none;"></div>
        <table id="result-table" style="display:none;">
          <thead><tr id="result-head"></tr></thead>
          <tbody id="result-body"></tbody>
        </table>
      </div>
    </div>

    <!-- Vertical resize -->
    <div class="resize-handle-v" id="resize-v"></div>

    <!-- Script panel -->
    <div id="script-panel">
      <div id="tab-bar">
        <button id="add-tab-btn" title="New tab">+</button>
      </div>
      <div id="editor-area">
        <textarea id="sql-editor" placeholder="-- enter sql query...&#10;-- ctrl+enter to execute&#10;-- click a table in sidebar to copy SELECT" spellcheck="false"></textarea>
        <div id="editor-toolbar">
          <button id="run-btn" disabled>Run</button>
          <span id="run-hint">Ctrl+Enter</span>
          <span id="exec-time"></span>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Status bar -->
<div id="status-bar">
  <span id="status-db">No database</span>
  <span id="status-tables"></span>
  <span style="margin-left:auto;" id="status-engine">&gt; loading sql.js...</span>
</div>

<!-- Hidden file input -->
<input type="file" id="file-input" accept=".db,.sqlite,.sqlite3" style="display:none;">

<!-- sql.js from CDN -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.3/sql-wasm.js"></script>

<script src="../storage.js"></script>
<script>

// ============================================================
// State
// ============================================================
const STORAGE_KEY = 'usqlitebrowser';
let SQL = null;   // sql.js constructor
let db = null;    // current database instance
let currentDbName = null;
let tabs = [];
let activeTabId = null;
let tabIdCounter = 0;

// ============================================================
// DOM Elements
// ============================================================
const treePanel = document.getElementById('tree-panel');
const treeContent = document.getElementById('tree-content');
const treePlaceholder = document.getElementById('tree-placeholder');
const tableContainer = document.getElementById('table-container');
const tablePlaceholder = document.getElementById('table-placeholder');
const errorDisplay = document.getElementById('error-display');
const resultTable = document.getElementById('result-table');
const resultHead = document.getElementById('result-head');
const resultBody = document.getElementById('result-body');
const resultInfo = document.getElementById('result-info');
const sqlEditor = document.getElementById('sql-editor');
const runBtn = document.getElementById('run-btn');
const execTime = document.getElementById('exec-time');
const tabBar = document.getElementById('tab-bar');
const addTabBtn = document.getElementById('add-tab-btn');
const fileInput = document.getElementById('file-input');
const openBtn = document.getElementById('open-btn');
const createBtn = document.getElementById('create-btn');
const exportBtn = document.getElementById('export-btn');
const dbNameEl = document.getElementById('db-name');
const statusDb = document.getElementById('status-db');
const statusTables = document.getElementById('status-tables');
const statusEngine = document.getElementById('status-engine');
const dropOverlay = document.getElementById('drop-overlay');
const scriptPanel = document.getElementById('script-panel');
const resizeH = document.getElementById('resize-h');
const resizeV = document.getElementById('resize-v');

// ============================================================
// appStorage persistence
// ============================================================
function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : null;
  } catch { return null; }
}

function saveState() {
  const tab = tabs.find(t => t.id === activeTabId);
  if (tab) tab.sql = sqlEditor.value;

  const state = {
    tabs: tabs.map(t => ({ id: t.id, name: t.name, sql: t.sql })),
    activeTabId,
    dbBytes: null,
    dbName: currentDbName,
    treePanelWidth: treePanel.style.width || null,
    scriptPanelHeight: scriptPanel.style.height || null,
  };

  if (db) {
    try {
      const bytes = db.export();
      if (bytes.byteLength < 10 * 1024 * 1024) {
        state.dbBytes = uint8ToBase64(bytes);
      }
    } catch {}
  }

  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch {}
}

function uint8ToBase64(u8) {
  let binary = '';
  const len = u8.length;
  for (let i = 0; i < len; i++) binary += String.fromCharCode(u8[i]);
  return btoa(binary);
}

function base64ToUint8(b64) {
  const binary = atob(b64);
  const u8 = new Uint8Array(binary.length);
  for (let i = 0; i < binary.length; i++) u8[i] = binary.charCodeAt(i);
  return u8;
}

// ============================================================
// Tabs
// ============================================================
function createTab(name, sql) {
  const id = ++tabIdCounter;
  const tab = { id, name: name || ('Query ' + id), sql: sql || '' };
  tabs.push(tab);
  renderTabs();
  switchTab(id);
  saveState();
  return tab;
}

function removeTab(id) {
  if (tabs.length <= 1) return;
  const idx = tabs.findIndex(t => t.id === id);
  tabs = tabs.filter(t => t.id !== id);
  if (activeTabId === id) {
    const newIdx = Math.min(idx, tabs.length - 1);
    switchTab(tabs[newIdx].id);
  }
  renderTabs();
  saveState();
}

function switchTab(id) {
  if (activeTabId !== null) {
    const current = tabs.find(t => t.id === activeTabId);
    if (current) current.sql = sqlEditor.value;
  }
  activeTabId = id;
  const tab = tabs.find(t => t.id === id);
  if (tab) sqlEditor.value = tab.sql;
  renderTabs();
  saveState();
}

function renameTab(id) {
  const tabEl = tabBar.querySelector('[data-tab-id="' + id + '"] .tab-label');
  if (!tabEl) return;
  const tab = tabs.find(t => t.id === id);
  if (!tab) return;

  const input = document.createElement('input');
  input.className = 'tab-rename-input';
  input.value = tab.name;
  tabEl.replaceWith(input);
  input.focus();
  input.select();

  const finish = () => {
    tab.name = input.value.trim() || tab.name;
    renderTabs();
    saveState();
  };
  input.addEventListener('blur', finish);
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') finish();
    if (e.key === 'Escape') renderTabs();
  });
}

function renderTabs() {
  tabBar.querySelectorAll('.tab').forEach(el => el.remove());

  tabs.forEach(tab => {
    const el = document.createElement('div');
    el.className = 'tab' + (tab.id === activeTabId ? ' active' : '');
    el.dataset.tabId = tab.id;
    el.innerHTML = '<span class="tab-label">' + escapeHtml(tab.name) + '</span><span class="close-tab">&times;</span>';
    el.querySelector('.tab-label').addEventListener('click', () => switchTab(tab.id));
    el.querySelector('.tab-label').addEventListener('dblclick', (e) => { e.stopPropagation(); renameTab(tab.id); });
    el.querySelector('.close-tab').addEventListener('click', (e) => { e.stopPropagation(); removeTab(tab.id); });
    tabBar.insertBefore(el, addTabBtn);
  });
}

addTabBtn.addEventListener('click', () => createTab());

// ============================================================
// SQL Execution
// ============================================================
function executeSQL(sql) {
  if (!db) { showError('> error: no database loaded'); return; }
  if (!sql.trim()) return;

  const tab = tabs.find(t => t.id === activeTabId);
  if (tab) tab.sql = sql;

  const start = performance.now();
  try {
    const statements = sql.split(';').map(s => s.trim()).filter(Boolean);
    let lastColumns = null;
    let lastRows = null;
    let totalChanges = 0;

    for (const stmt of statements) {
      const upper = stmt.toUpperCase().trimStart();
      if (upper.startsWith('SELECT') || upper.startsWith('PRAGMA') || upper.startsWith('EXPLAIN') || upper.startsWith('WITH')) {
        const result = execSelect(stmt);
        lastColumns = result.columns;
        lastRows = result.rows;
      } else {
        db.run(stmt);
        totalChanges += db.getRowsModified();
      }
    }

    const elapsed = (performance.now() - start).toFixed(1);
    execTime.textContent = elapsed + ' ms';

    if (lastColumns) {
      showResults(lastColumns, lastRows, elapsed);
    } else {
      showInfo('> ok. rows affected: ' + totalChanges);
      refreshTree();
    }

    if (statements.some(s => {
      const u = s.toUpperCase().trimStart();
      return u.startsWith('CREATE') || u.startsWith('DROP') || u.startsWith('ALTER');
    })) {
      refreshTree();
    }

    saveState();
  } catch (err) {
    const elapsed = (performance.now() - start).toFixed(1);
    execTime.textContent = elapsed + ' ms';
    showError(err.message || String(err));
  }
}

function execSelect(sql) {
  const columns = [];
  const rows = [];
  const prepared = db.prepare(sql);
  const colNames = prepared.getColumnNames();
  colNames.forEach(c => columns.push(c));
  while (prepared.step()) {
    rows.push(prepared.get());
  }
  prepared.free();
  return { columns, rows };
}

function showResults(columns, rows, elapsed) {
  errorDisplay.style.display = 'none';
  tablePlaceholder.style.display = 'none';
  resultTable.style.display = '';
  resultInfo.textContent = rows.length + ' row' + (rows.length !== 1 ? 's' : '') + ' \u00b7 ' + elapsed + ' ms';

  resultHead.innerHTML = columns.map(c => '<th>' + escapeHtml(c) + '</th>').join('');
  resultBody.innerHTML = rows.map(row =>
    '<tr>' + row.map(cell =>
      cell === null ? '<td class="null-value">NULL</td>' : '<td>' + escapeHtml(String(cell)) + '</td>'
    ).join('') + '</tr>'
  ).join('');
}

function showError(msg) {
  tablePlaceholder.style.display = 'none';
  resultTable.style.display = 'none';
  errorDisplay.style.display = '';
  errorDisplay.textContent = msg;
  resultInfo.textContent = '> error';
}

function showInfo(msg) {
  tablePlaceholder.style.display = '';
  tablePlaceholder.textContent = msg;
  resultTable.style.display = 'none';
  errorDisplay.style.display = 'none';
  resultInfo.textContent = '';
}

runBtn.addEventListener('click', () => executeSQL(sqlEditor.value));

sqlEditor.addEventListener('keydown', (e) => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
    e.preventDefault();
    executeSQL(sqlEditor.value);
  }
  if (e.key === 'Tab') {
    e.preventDefault();
    const start = sqlEditor.selectionStart;
    const end = sqlEditor.selectionEnd;
    sqlEditor.value = sqlEditor.value.substring(0, start) + '  ' + sqlEditor.value.substring(end);
    sqlEditor.selectionStart = sqlEditor.selectionEnd = start + 2;
  }
});

// Auto-save on input (debounced)
let saveTimeout = null;
sqlEditor.addEventListener('input', () => {
  const tab = tabs.find(t => t.id === activeTabId);
  if (tab) tab.sql = sqlEditor.value;
  clearTimeout(saveTimeout);
  saveTimeout = setTimeout(saveState, 500);
});

// ============================================================
// Tree View
// ============================================================
function refreshTree() {
  if (!db) {
    treePlaceholder.style.display = '';
    treeContent.querySelectorAll('.tree-group, .tree-children').forEach(el => el.remove());
    statusDb.textContent = '> no database';
    statusTables.textContent = '';
    return;
  }

  treePlaceholder.style.display = 'none';
  treeContent.querySelectorAll('.tree-group, .tree-children').forEach(el => el.remove());

  // Get tables and views
  const tableItems = [];
  const viewItems = [];

  const stmt = db.prepare("SELECT name, type FROM sqlite_master WHERE type IN ('table','view') AND name NOT LIKE 'sqlite_%' ORDER BY type, name");
  while (stmt.step()) {
    const row = stmt.getAsObject();
    if (row.type === 'table') tableItems.push(row);
    else viewItems.push(row);
  }
  stmt.free();

  if (tableItems.length > 0) renderTreeGroup('Tables', tableItems, 'table');
  if (viewItems.length > 0) renderTreeGroup('Views', viewItems, 'view');

  statusDb.innerHTML = '<span class="status-accent">' + escapeHtml(currentDbName || 'In-memory') + '</span>';
  statusTables.textContent = tableItems.length + ' table' + (tableItems.length !== 1 ? 's' : '') +
    (viewItems.length > 0 ? ', ' + viewItems.length + ' view' + (viewItems.length !== 1 ? 's' : '') : '');
}

function renderTreeGroup(label, items, type) {
  const group = document.createElement('div');
  group.className = 'tree-group';
  group.innerHTML = '<span class="chevron">\u25BC</span> ' + label + ' (' + items.length + ')';
  group.addEventListener('click', () => group.classList.toggle('collapsed'));
  treeContent.appendChild(group);

  const children = document.createElement('div');
  children.className = 'tree-children';

  items.forEach(item => {
    // Table name row
    const tableRow = document.createElement('div');
    tableRow.className = 'tree-item';
    const icon = type === 'view' ? '\u{1D54D}' : '\u25A6';
    tableRow.innerHTML = '<span class="tree-table-icon">' + icon + '</span> <span class="tree-table-name">' + escapeHtml(item.name) + '</span>';
    tableRow.addEventListener('click', () => copySelectStatement(item.name));
    children.appendChild(tableRow);

    // Columns and metadata
    try {
      const colStmt = db.prepare('PRAGMA table_info("' + item.name.replace(/"/g, '""') + '")');
      const columns = [];
      while (colStmt.step()) columns.push(colStmt.getAsObject());
      colStmt.free();

      // Row count
      let rowCount = '?';
      try {
        const countStmt = db.prepare('SELECT COUNT(*) as c FROM "' + item.name.replace(/"/g, '""') + '"');
        if (countStmt.step()) rowCount = countStmt.getAsObject().c;
        countStmt.free();
      } catch {}

      const meta = document.createElement('div');
      meta.className = 'tree-item tree-meta';
      meta.textContent = columns.length + ' columns, ' + rowCount + ' rows';
      children.appendChild(meta);

      columns.forEach(col => {
        const colRow = document.createElement('div');
        colRow.className = 'tree-item';
        colRow.innerHTML =
          '<span class="tree-col-icon">\u2502</span>' +
          '<span class="tree-col-name">' + escapeHtml(col.name) + '</span>' +
          (col.pk ? '<span class="tree-col-pk">PK</span>' : '') +
          '<span class="tree-col-type">' + escapeHtml(col.type || 'any') + '</span>';
        children.appendChild(colRow);
      });
    } catch {}
  });

  treeContent.appendChild(children);
}

function copySelectStatement(tableName) {
  const escaped = tableName.replace(/"/g, '""');
  const stmt = 'SELECT * FROM "' + escaped + '" LIMIT 100;';
  navigator.clipboard.writeText(stmt).then(() => {
    showToast('> copied to clipboard');
  }).catch(() => {
    // Fallback: paste into editor
    sqlEditor.value = stmt;
    showToast('> pasted to editor');
  });
}

function showToast(msg) {
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 1800);
}

// ============================================================
// Database operations
// ============================================================
function openDatabase(arrayBuffer, name) {
  if (db) { db.close(); db = null; }
  const bytes = new Uint8Array(arrayBuffer);
  db = new SQL.Database(bytes);
  currentDbName = name || 'database.db';
  dbNameEl.textContent = currentDbName;
  runBtn.disabled = false;
  refreshTree();
  saveState();
}

function createNewDatabase() {
  if (db) { db.close(); db = null; }
  db = new SQL.Database();
  currentDbName = 'new.db';
  dbNameEl.textContent = currentDbName;
  runBtn.disabled = false;
  refreshTree();
  saveState();
}

function exportDatabase() {
  if (!db) return;
  try {
    const bytes = db.export();
    const blob = new Blob([bytes], { type: 'application/x-sqlite3' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = currentDbName || 'database.db';
    a.click();
    URL.revokeObjectURL(url);
  } catch (err) {
    showError('> export failed: ' + err.message);
  }
}

openBtn.addEventListener('click', () => fileInput.click());
createBtn.addEventListener('click', createNewDatabase);
exportBtn.addEventListener('click', exportDatabase);

fileInput.addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try {
      openDatabase(reader.result, file.name);
    } catch (err) {
      showError('> error: failed to open database\n> ' + err.message);
    }
  };
  reader.readAsArrayBuffer(file);
  fileInput.value = '';
});

// ============================================================
// Drag & Drop
// ============================================================
let dragCounter = 0;

document.addEventListener('dragenter', (e) => {
  e.preventDefault();
  dragCounter++;
  dropOverlay.classList.add('visible');
});

document.addEventListener('dragleave', (e) => {
  e.preventDefault();
  dragCounter--;
  if (dragCounter <= 0) { dragCounter = 0; dropOverlay.classList.remove('visible'); }
});

document.addEventListener('dragover', (e) => e.preventDefault());

document.addEventListener('drop', (e) => {
  e.preventDefault();
  dragCounter = 0;
  dropOverlay.classList.remove('visible');
  const file = e.dataTransfer.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try { openDatabase(reader.result, file.name); }
    catch (err) { showError('> error: failed to open database\n> ' + err.message); }
  };
  reader.readAsArrayBuffer(file);
});

// ============================================================
// Resize Handles
// ============================================================
resizeH.addEventListener('mousedown', (e) => {
  e.preventDefault();
  resizeH.classList.add('active');
  const startX = e.clientX;
  const startW = treePanel.offsetWidth;
  const onMove = (ev) => {
    treePanel.style.width = Math.max(140, Math.min(600, startW + ev.clientX - startX)) + 'px';
  };
  const onUp = () => {
    resizeH.classList.remove('active');
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup', onUp);
    saveState();
  };
  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', onUp);
});

resizeV.addEventListener('mousedown', (e) => {
  e.preventDefault();
  resizeV.classList.add('active');
  const startY = e.clientY;
  const startH = scriptPanel.offsetHeight;
  const onMove = (ev) => {
    scriptPanel.style.height = Math.max(80, Math.min(window.innerHeight - 200, startH - (ev.clientY - startY))) + 'px';
  };
  const onUp = () => {
    resizeV.classList.remove('active');
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup', onUp);
    saveState();
  };
  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', onUp);
});

// ============================================================
// Utilities
// ============================================================
function escapeHtml(str) {
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

// ============================================================
// Init
// ============================================================
async function init() {
  try {
    SQL = await initSqlJs({
      locateFile: file => 'https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.3/' + file
    });
    statusEngine.textContent = '> sqlite engine ready (sql.js wasm)';

    // Restore state from appStorage
    const state = loadState();
    if (state) {
      if (state.treePanelWidth) treePanel.style.width = state.treePanelWidth;
      if (state.scriptPanelHeight) scriptPanel.style.height = state.scriptPanelHeight;

      // Restore tabs
      if (state.tabs && state.tabs.length > 0) {
        tabIdCounter = Math.max(...state.tabs.map(t => t.id));
        tabs = state.tabs;
        activeTabId = state.activeTabId || tabs[0].id;
        const tab = tabs.find(t => t.id === activeTabId);
        if (tab) sqlEditor.value = tab.sql;
        renderTabs();
      } else {
        createTab('Query 1', '');
      }

      // Restore database
      if (state.dbBytes) {
        try {
          const bytes = base64ToUint8(state.dbBytes);
          db = new SQL.Database(bytes);
          currentDbName = state.dbName || 'database.db';
          dbNameEl.textContent = currentDbName;
          runBtn.disabled = false;
          refreshTree();
        } catch (err) {
          console.warn('Failed to restore database:', err);
        }
      }
    } else {
      createTab('Query 1', '');
    }

    runBtn.disabled = !db;
  } catch (err) {
    statusEngine.textContent = '> error: engine failed';
    console.error('sql.js init failed:', err);
    showError('> fatal: failed to load sqlite wasm engine\n> check connection and refresh');
    createTab('Query 1', '');
  }
}

init();
