<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#f0a030">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/svg+xml" href="../icons/usvg.svg">
  <link rel="apple-touch-icon" href="../icons/usvg.png">
  <title>usvg — SVG Editor</title>

  <!-- CodeMirror 5 from CDN -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/codemirror.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/theme/material-darker.min.css">

  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Toolbar -->
  <div id="toolbar">
    <div class="toolbar-left">
      <span class="app-title">usvg</span>
    </div>
    <div class="toolbar-right">
      <button id="btn-new" title="New document">New</button>
      <button id="btn-paste-img" title="Paste image from clipboard">Paste Image</button>
      <button id="btn-copy-svg" title="Copy SVG to clipboard">Copy SVG</button>
      <button id="btn-copy-png" title="Copy as PNG to clipboard">Copy PNG</button>
      <button id="btn-save-svg" title="Save SVG (Ctrl+S)">Save SVG</button>
      <button id="btn-export-png" title="Export as PNG">Export PNG</button>
    </div>
  </div>

  <!-- Main split pane -->
  <div id="main">
    <!-- Left pane: code editor -->
    <div id="editor-pane">
      <textarea id="editor-textarea"></textarea>
    </div>

    <!-- Resizable divider -->
    <div id="divider"></div>

    <!-- Right pane: SVG preview -->
    <div id="preview-pane">
      <div id="preview"></div>
      <div id="drop-overlay">Drop image here</div>
      <!-- Element selection overlay for visual editing -->
      <div id="element-overlay" class="element-overlay">
        <div class="overlay-handle overlay-handle-right"></div>
        <div class="overlay-handle overlay-handle-bottom"></div>
        <div class="overlay-handle overlay-handle-corner"></div>
      </div>
    </div>
  </div>

  <!-- Status bar -->
  <div id="status-bar">
    <span id="coord-display"></span>
    <span style="margin-left:auto;font-size:11px;color:#6b7a94;">All data stays on your device</span>
  </div>

  <!-- Hidden canvas for PNG export -->
  <canvas id="export-canvas" style="display:none;"></canvas>

  <!-- CodeMirror 5 JS -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/codemirror.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/mode/xml/xml.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/addon/edit/closetag.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/addon/fold/xml-fold.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/addon/edit/matchtags.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/addon/fold/foldcode.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/addon/fold/foldgutter.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/addon/fold/foldgutter.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/addon/hint/show-hint.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/addon/hint/xml-hint.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/addon/hint/show-hint.min.css">

  <script src="svg-schema.js"></script>
  <script src="../storage.js"></script>
  <script src="app.js"></script>
</body>
<script>if('serviceWorker' in navigator)navigator.serviceWorker.register('../sw.js');</script>
</html>
